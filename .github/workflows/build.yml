name: Build Steamwork

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout steamwork ---
      - name: Checkout steamwork
        uses: actions/checkout@v4
        with:
          path: steamwork

      # --- Checkout rebar ---
      - name: Checkout rebar
        uses: actions/checkout@v4
        with:
          repository: pylonmc/rebar
          ref: '0.39.0'
          path: rebar

      # --- Checkout pylon ---
      - name: Checkout pylon
        uses: actions/checkout@v4
        with:
          repository: pylonmc/pylon
          ref: '0.37.0'
          path: pylon

      # --- Set up JDK 25 ---
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # --- Setup Gradle ---
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # --- Build rebar (jar goes to rebar/rebar/build/libs/) ---
      - name: Build rebar
        working-directory: rebar
        run: ./gradlew shadowJar -x test --no-daemon

      # --- Build pylon (uses rebar via composite build) ---
      - name: Build pylon
        working-directory: pylon
        run: ./gradlew build -x test --include-build ../rebar --no-daemon

      # --- Build steamwork ---
      - name: Build steamwork
        working-directory: steamwork
        run: ./gradlew build -x test --no-daemon

      # --- Upload artifact (shadowJar) ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steamwork
          path: steamwork/build/libs/*.jar
          if-no-files-found: error
