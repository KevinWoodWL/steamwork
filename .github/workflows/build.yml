name: Build Steamwork

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout steamwork ---
      - name: Checkout steamwork
        uses: actions/checkout@v4
        with:
          path: steamwork

      # --- Checkout rebar (master — v0.4.5 适配 rebar 0.42 API) ---
      - name: Checkout rebar
        uses: actions/checkout@v4
        with:
          repository: pylonmc/rebar
          ref: 'af416af520ee381ddb79ff90f8b854969080a224'
          path: rebar

      # --- Checkout pylon (master — v0.4.5 适配 pylon 0.40 API) ---
      - name: Checkout pylon
        uses: actions/checkout@v4
        with:
          repository: pylonmc/pylon
          ref: '95befbaf770a083a9900fdafe5a9e6fd5c50ded5'
          path: pylon

      # --- Set up JDK 25 ---
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # --- Setup Gradle ---
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # --- Build rebar (jar goes to rebar/rebar/build/libs/) ---
      - name: Build rebar
        working-directory: rebar
        run: ./gradlew shadowJar -x test --no-daemon

      # --- Build pylon (uses rebar local jar) ---
      - name: Build pylon
        working-directory: pylon
        run: ./gradlew shadowJar -x test --no-daemon

      # --- Build steamwork ---
      - name: Build steamwork
        working-directory: steamwork
        run: ./gradlew build -x test --no-daemon

      # --- Upload artifact (shadowJar) ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steamwork
          path: steamwork/build/libs/*.jar
          if-no-files-found: error
