# 蒸汽机器人：巡游与燃料参数。
# 后续阶段会加入作业、充能（充汽舱绑定）等设置。
tick-interval: 10        # 决策间隔（tick）
wander-radius: 6.0       # 以部署点为原点的巡游半径（格）
move-speed: 1.0          # 寻路移动速度倍率

# 燃料（P1a）
steam-capacity: 2000.0   # 内置蒸汽容量（mB），满汽部署
steam-per-tick: 10.0     # 每次决策 tick 行动耗汽（mB）；耗尽则缺汽停摆

# 充能（P1b）
recharge-at: 0.25        # 蒸汽低于容量该比例时，回绑定充汽舱充能（首次被充汽自动绑定）

# 作业（P2 采矿/砍树）
work-radius: 5           # 工作区半径（以 home 为中心的立方体半边长，格）；越大扫描越慢
steam-per-break: 30.0    # 每破坏一个方块额外耗汽（mB）
