# 蒸汽差分机：可编程 N 阶差分寄存器（致敬巴贝奇差分机）。
# 每个「工作冲程」消耗一份蒸汽，把各阶差分逐级累加，吐出序列下一项。
# 全部寄存器在模 ceiling 算术下运算，因此序列必然有界且周期回绕。
tick-interval: 1
# 每种蒸汽的内部缓冲容量（mB）
buffer: 2000.0
# 每个工作冲程消耗的蒸汽量（mB）——驱动一次差分递推
steam-per-stroke: 100.0
# 红石 / 蒸汽脉冲模式下，两次冲程之间的固定间隔（tick）
stroke-interval: 20
# 回绕上限默认值（模数）。设 16 时序列值 0–15 正好直接对应红石 0–15
default-ceiling: 16
# 差分阶数上限（1=等差斜坡，2=抛物线，3=三次曲线）
max-order: 3
# 蒸汽脉冲模式：单次向下游推送的最大蒸汽量（mB），防止序列值过大时瞬间放空
max-pulse-amount: 1500.0
# 分频模式：序列值被夹到的脉冲间隔区间（tick）
min-frequency-interval: 2
max-frequency-interval: 200
# 分频模式：每次红石脉冲的高电平持续时长（tick）
pulse-length: 2
