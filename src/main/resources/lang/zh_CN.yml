addon: "蒸汽工坊"

item:
  zinc_ingot:
    name: "锌锭"
    lore: <arrow> 一种银灰色的基础金属，用于制造黄铜合金

  brass_ingot:
    name: "黄铜锭"
    lore: <arrow> 铜与锌的坚固合金，用于压力接头和蒸汽机械

  nichrome_dust:
    name: "镍铬合金粉末"
    lore: |-
      <arrow> 在蒸汽加压炉中混合出的耐热合金粉末
      <arrow> 冶炼后可得到镍铬合金锭

  nichrome_ingot:
    name: "镍铬合金锭"
    lore: |-
      <arrow> 一种高电阻、耐高温的合金，用于加热线圈和高温设备
      <arrow> 由镍铬合金粉末冶炼而成

  rubber_gasket:
    name: "橡胶垫圈"
    lore: <arrow> 用于密封管道接缝，防止蒸汽泄漏

  pressure_gauge:
    name: "压力表"
    lore: <arrow> 用于读取锅炉压力的小型表盘

  zinc_concentrate:
    name: "锌精矿"
    lore: |-
      <arrow> 由蒸汽洗选槽从紫水晶矿物中洗选出的含锌精矿
      <arrow> 冶炼后可得到锌锭

  plant_fiber:
    name: "植物纤维"
    lore: |-
      <arrow> 由蒸汽浸煮桶软化出的耐热纤维
      <arrow> 可作为绳线和线圈缠绕材料

  steam_pulp:
    name: "蒸汽纸浆"
    lore: |-
      <arrow> 植物材料经热水和蒸汽浸煮后的浆料
      <arrow> 可压制成纸

  raw_resin:
    name: "粗树脂"
    lore: |-
      <arrow> 从根系、木材或黏性材料中蒸汽浸提出的树脂
      <arrow> 灭菌硫化后可得到橡胶

  vulcanized_rubber:
    name: "硫化橡胶"
    lore: |-
      <arrow> 经蒸汽灭菌箱处理后的耐热橡胶
      <arrow> 用于制作蒸汽密封件

  sterile_biomass:
    name: "无菌生质"
    lore: |-
      <arrow> 腐败或菌类材料经高温蒸汽处理后的稳定基质
      <arrow> 后续可用于农业、发酵或化学流程

  silica_grit:
    name: "二氧化硅砂"
    lore: |-
      <arrow> 洗选出的高纯细砂
      <arrow> 可用于绝热材料、玻璃和助熔剂

  mineral_flux:
    name: "矿物助熔剂"
    lore: |-
      <arrow> 由细砂、黏土和骨粉调制的冶炼添加剂
      <arrow> 后续可用于高温合金和炉体材料

  granite_dust:
    name: "花岗岩粉"
    lore: |-
      <arrow> 沙砾经蒸汽洗选分离出的岩石矿物碎屑
      <arrow> 可用于建材或进一步加工

  diorite_dust:
    name: "闪长岩粉"
    lore: |-
      <arrow> 沙砾经蒸汽洗选分离出的岩石矿物碎屑
      <arrow> 可用于建材或进一步加工

  andesite_dust:
    name: "安山岩粉"
    lore: |-
      <arrow> 沙砾经蒸汽洗选分离出的岩石矿物碎屑
      <arrow> 可用于建材或进一步加工

  treated_wood:
    name: "处理木材"
    lore: |-
      <arrow> 经蒸汽浸煮后稳定下来的木质结构材料
      <arrow> 适合用于早期机器框架和绝缘外壳

  fiberboard:
    name: "纤维板"
    lore: |-
      <arrow> 由纸浆、植物纤维和树脂压制而成
      <arrow> 可作为轻质结构板和隔热内衬

  rubberized_fabric:
    name: "覆胶织物"
    lore: |-
      <arrow> 植物纤维经蒸汽灭菌与树脂处理后的柔性材料
      <arrow> 适合做密封套、软管和防护层

  sterile_culture:
    name: "无菌培养基"
    lore: |-
      <arrow> 无菌生质进一步蒸汽处理后的稳定培养材料
      <arrow> 后续可用于发酵、药剂或生物工艺

  machine_scrap:
    name: "机器废屑"
    lore: |-
      <arrow> 蒸汽机器长时间运行后剥落的金属碎渣与磨损零件
      <arrow> 每条配方完成时有少量概率从机器上方掉落
      <arrow> 来源：蒸汽灭菌箱、蒸汽浸煮桶、蒸汽洗选槽、蒸汽冲压机、蒸汽研磨机
      <arrow> 攒一些丢回研磨机可回收成铁锭

  heat_treated_metal:
    name: "热处理金属"
    lore: |-
      <arrow> 经高温蒸汽处理后应力均匀化的致密金属板
      <arrow> 用于制造需要高强度结构的蒸汽机械零件

  brass_gear:
    name: "黄铜齿轮"
    lore: <arrow> 精密的机械传动部件

  heating_coil:
    name: "加热线圈"
    lore: <arrow> 镍铬合金制成的耐热线圈，用于高温设备

  # ───── 黄铜机械组件 ─────
  brass_distillation_tube:
    name: "黄铜蒸馏管"
    lore: <arrow> 黄铜与锡片弯曲而成的耐腐蚀管道，用于蒸汽蒸馏

  brass_filter:
    name: "黄铜滤网"
    lore: <arrow> 黄铜与锡片编织的过滤网，用于浸煮分离

  brass_sieve:
    name: "黄铜筛网"
    lore: <arrow> 黄铜与锡片编织的多孔结构，用于洗选槽颗粒分级

  brass_flow_valve:
    name: "黄铜分流阀"
    lore: <arrow> 黄铜与红石控制的水流阀门，用于精确控制

  brass_fan_blade:
    name: "黄铜扇叶"
    lore: <arrow> 黄铜与锡片制成的高效气流推进叶片

  brass_valve_core:
    name: "黄铜阀芯"
    lore: <arrow> 锌与黄铜合金制成的强度阀芯

  brass_seal_ring:
    name: "黄铜密封环"
    lore: <arrow> 黄铜与锡片制成的耐高压密封圈

  # ───── 加压合金 ─────
  invar_dust:
    name: "因瓦合金粉末"
    lore: |-
      <arrow> 在蒸汽加压炉中压合出的精密合金粉末
      <arrow> 冶炼后可得到因瓦合金锭

  invar_ingot:
    name: "因瓦合金锭"
    lore: |-
      <arrow> 极低热膨胀系数的铁镍合金，用于精密仪器
      <arrow> 由因瓦合金粉末冶炼而成

  duralumin_dust:
    name: "硬铝合金粉末"
    lore: |-
      <arrow> 在蒸汽压力下混合的轻质合金粉末
      <arrow> 冶炼后可得到硬铝合金锭

  duralumin_ingot:
    name: "硬铝合金锭"
    lore: |-
      <arrow> 铜与紫水晶共炼的高强度轻质合金
      <arrow> 由硬铝合金粉末冶炼而成

  tungsten_dust:
    name: "钨粉末"
    lore: |-
      <arrow> 通过高压蒸汽压制出的耐热金属粉末
      <arrow> 冶炼后可得到钨锭

  tungsten_ingot:
    name: "钨锭"
    lore: |-
      <arrow> 极端耐高温的稀有金属，用于高负载部件
      <arrow> 由钨粉末冶炼而成

  manganese_steel_dust:
    name: "锰钢粉末"
    lore: |-
      <arrow> 以高压蒸汽压入锰质添加剂的合金钢粉末
      <arrow> 冶炼后可得到锰钢锭

  manganese_steel_ingot:
    name: "锰钢锭"
    lore: |-
      <arrow> 添加锰元素的高耐磨合金钢
      <arrow> 由锰钢粉末冶炼而成

  manganese_bronze_dust:
    name: "锰青铜粉末"
    lore: |-
      <arrow> 蒸汽压制出的传动用青铜合金粉末
      <arrow> 冶炼后可得到锰青铜锭

  manganese_bronze_ingot:
    name: "锰青铜锭"
    lore: |-
      <arrow> 含锰和铁的改良青铜，优质轴承材料
      <arrow> 由锰青铜粉末冶炼而成

  # ───── 合金块 ─────
  invar_block:
    name: "因瓦合金块"
    lore: <arrow> 由因瓦合金锭压制而成的致密金属块
  duralumin_block:
    name: "硬铝合金块"
    lore: <arrow> 由硬铝合金锭压制而成的轻质金属块
  tungsten_block:
    name: "钨块"
    lore: <arrow> 由钨锭压制而成的沉重金属块
  manganese_steel_block:
    name: "锰钢块"
    lore: <arrow> 由锰钢锭压制而成的高强度金属块
  manganese_bronze_block:
    name: "锰青铜块"
    lore: <arrow> 由锰青铜锭压制而成的耐磨金属块

  # ───── 机械组件 ─────
  steam_motor:
    name: "蒸汽马达"
    lore: <arrow> 驱动蒸汽机械的核心动力单元
    tooltip: "<gray>由Pylon和Steamwork中期产物组装而成"

  # ───── 蒸汽武器 ─────
  steam_sword:
    name: "蒸汽剑"
    lore: |-
      <arrow> 注入蒸汽动力的锋利剑刃
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>攻击技能：<aqua>⚔ 蒸汽横扫斩</aqua>
      <arrow>   <dark_gray>有汽攻击 · 强化伤害 · 横扫周围敌人 · 点燃 2 秒
      <arrow> <gray>右键技能：<aqua>💨 蒸汽喷射</aqua>
      <arrow>   <dark_gray>向视线锥形喷射蒸汽 · 伤害+点燃前方敌人（2.5s 冷却）
      <arrow> <gray>耗尽：伤害降低，蒸汽特效停止

  # ───── 蒸汽工具 ─────
  steam_pickaxe:
    name: "蒸汽镐"
    lore: |-
      <arrow> 蒸汽驱动的旋转冲击镐
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>蒸汽技能：<aqua>⛏ 范围采掘 3×3</aqua>
      <arrow>   <dark_gray>有汽挖掘 · 同时破坏周围一圈适用方块
      <arrow> <gray>耗尽：失去范围挖掘并获得短暂挖掘疲劳

  steam_axe:
    name: "蒸汽斧"
    lore: |-
      <arrow> 内置蒸汽引擎的伐木斧
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>蒸汽技能：<aqua>🪓 范围伐木 3×3</aqua>
      <arrow>   <dark_gray>有汽砍伐 · 同时破坏周围一圈可用斧采集的方块
      <arrow> <gray>耗尽：失去范围砍伐并获得短暂挖掘疲劳

  steam_shovel:
    name: "蒸汽锹"
    lore: |-
      <arrow> 带有振动装置的蒸汽动力锹
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>蒸汽技能：<aqua>⛏ 范围掘土 3×3</aqua>
      <arrow>   <dark_gray>有汽铲挖 · 同时铲除周围一圈泥土、沙砾等松散方块
      <arrow> <gray>耗尽：失去范围铲挖并获得短暂挖掘疲劳

  steam_hoe:
    name: "蒸汽锄"
    lore: |-
      <arrow> 蒸汽驱动的农耕工具
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>蒸汽技能：<aqua>🌱 范围耕作 3×3</aqua>
      <arrow>   <dark_gray>有汽右键 · 一次将周围一圈土地翻成耕地
      <arrow> <gray>耗尽：无法触发范围耕地并获得短暂挖掘疲劳

  # ───── 蒸汽盔甲 ─────
  steam_helmet:
    name: "蒸汽头盔"
    lore: |-
      <arrow> 内置微型锅炉的防护头盔
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>穿戴有汽：待机不耗汽，受击耗汽；提供夜视与水下呼吸
      <arrow> <gray>全套技能：<aqua>⚡ 蒸汽冲刺</aqua><dark_gray>（详见胸甲）
      <arrow> <gray>耗尽：增益停止，蒸汽喷雾特效消失

  steam_chestplate:
    name: "蒸汽胸甲"
    lore: |-
      <arrow> 以黄铜和铁锻造的重型蒸汽胸甲
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>全套有汽：待机不耗汽，受击耗汽；提供抗性提升
      <arrow> <gray>全套技能：<aqua>⚡ 蒸汽冲刺</aqua>
      <arrow>   <dark_gray>副手键 · 向面朝方向爆发冲刺 · 附加速度II与吸收
      <arrow> <gray>耗尽：增益与套装技能停止

  steam_leggings:
    name: "蒸汽护腿"
    lore: |-
      <arrow> 内衬蒸汽管道的强化护腿
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>穿戴有汽：待机不耗汽，受击耗汽；提供移速提升
      <arrow> <gray>全套技能：<aqua>⚡ 蒸汽冲刺</aqua><dark_gray>（详见胸甲）
      <arrow> <gray>耗尽：速度增益停止

  steam_boots:
    name: "蒸汽靴子"
    lore: |-
      <arrow> 装有减震蒸汽弹簧的重型靴子
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>穿戴有汽：待机不耗汽，受击耗汽；提供缓降保护
      <arrow> <gray>全套技能：<aqua>⚡ 蒸汽冲刺</aqua><dark_gray>（详见胸甲）
      <arrow> <gray>耗尽：落地保护停止

  steam_bronze_sword:
    name: "青铜蒸汽剑"
    lore: |-
      <arrow> Pylon 青铜强化的稳固蒸汽剑
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>攻击技能：<gold>⚔ 烈焰横扫斩</gold>
      <arrow>   <dark_gray>有汽攻击 · 强化伤害 · 横扫周围敌人 · 点燃 5 秒烈焰（耗汽略低）
      <arrow> <gray>右键技能：<gold>💨 烈焰喷射</gold>
      <arrow>   <dark_gray>向视线锥形喷射烈焰 · 伤害+长时间点燃前方敌人（2.5s 冷却）
      <arrow> <gray>耗尽：伤害降低，火花与喷汽停止
  steam_bronze_pickaxe:
    name: "青铜蒸汽镐"
    lore: |-
      <arrow> 耐用的青铜冲击镐，适合早期矿脉开采
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>蒸汽技能：<gold>⛏ 熔炼采掘 3×3</gold>
      <arrow>   <dark_gray>有汽挖掘 3×3 · 矿石掉落自动冶炼成锭（耗汽略低）
      <arrow> <gray>耗尽：失去范围挖掘并获得短暂挖掘疲劳
  steam_bronze_axe:
    name: "青铜蒸汽斧"
    lore: |-
      <arrow> 以青铜传动件强化的蒸汽伐木斧
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>蒸汽技能：<gold>🪓 熔炼伐木 3×3</gold>
      <arrow>   <dark_gray>有汽砍伐 3×3 · 可冶炼掉落物自动熔炼（耗汽略低）
      <arrow> <gray>耗尽：失去范围砍伐并获得短暂挖掘疲劳
  steam_bronze_shovel:
    name: "青铜蒸汽锹"
    lore: |-
      <arrow> 稳定耐磨的青铜蒸汽掘土工具
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>蒸汽技能：<gold>⛏ 熔炼掘土 3×3</gold>
      <arrow>   <dark_gray>有汽铲挖 3×3 · 沙等可冶炼掉落自动熔炼（耗汽略低）
      <arrow> <gray>耗尽：失去范围铲挖并获得短暂挖掘疲劳
  steam_bronze_hoe:
    name: "青铜蒸汽锄"
    lore: |-
      <arrow> 青铜机构驱动的蒸汽农耕工具
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>蒸汽技能：<aqua>🌱 范围耕作 3×3</aqua>
      <arrow>   <dark_gray>有汽右键 · 一次将周围一圈土地翻成耕地（耗汽略低）
      <arrow> <gray>耗尽：无法触发范围耕地
  steam_bronze_helmet:
    name: "青铜蒸汽头盔"
    lore: |-
      <arrow> 稳固的青铜蒸汽防护头盔
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>穿戴有汽：待机不耗汽，受击低耗汽；夜视与水下呼吸
      <arrow> <gray>全套技能：<gold>🔥 熔炉吐息</gold><dark_gray>（详见胸甲）
      <arrow> <gray>耗尽：增益停止
  steam_bronze_chestplate:
    name: "青铜蒸汽胸甲"
    lore: |-
      <arrow> Pylon 青铜板件加固的蒸汽胸甲
      <arrow> <gray>安装蒸汽罐后显示实时加压蒸汽条
      <arrow> <gray>全套有汽：待机不耗汽，受击低耗汽；抗性提升
      <arrow> <gray>全套技能：<gold>🔥 熔炉吐息</gold>
      <arrow>   <dark_gray>副手键 · 5格环形火焰爆炸 · 点燃并伤害周围所有生物
      <arrow> <gray>耗尽：增益与套装技能停止
  steam_bronze_leggings:
    name: "青铜蒸汽护腿"
    lore: |-
      <arrow> 耐磨青铜关节支撑的蒸汽护腿
