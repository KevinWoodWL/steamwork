      active: "<green>运行中"
      idle: "<gray>待机"

  advanced_steam_turbine:
    title: "<dark_gray>高级蒸汽涡轮"
    steam_gauge: "<aqua>蒸汽储量"
    steam: "<gray>蒸汽：<reset><aqua>%steam% <gray>/ <aqua>%capacity%"
    progress_bar: "<reset>%bar% <gray>%percent%"
    scan: "<green>扫描范围"
    scan_radius: "<gray>半径：<reset><yellow>%radius%"
    targets_found: "<gray>检测到热源：<reset><yellow>%targets%"
    boost: "<gray>每次加速：<reset><yellow>%ticks% ticks <gray>| 蒸汽 <aqua>%steam%"
    last_boosted: "<gray>上次加速目标：<reset><yellow>%boosted%"
    last_steam_used: "<gray>上次耗汽：<reset><aqua>%steam%"
    status:
      active: "<green>运行中"
      idle: "<gray>待机"

  steam_processor:
    input_count: "<gray>输入槽物品：<reset><yellow>%count%"
    output_count: "<gray>输出槽物品：<reset><yellow>%count%"
    steam_status_normal: "<gray>状态：<green>正常"
    steam_status_low: "<gray>状态：<red>蒸汽不足"
    progress_idle: "<gray>等待可处理的材料"
    progress_percent: "<gray>进度：<reset>%percent%"
