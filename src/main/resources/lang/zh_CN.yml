      <arrow> 同时驱动上限：4 台
      <arrow> <aqua>消耗加压蒸汽</aqua>
      <arrow> <attr>扫描半径：</attr> %scan-radius%
      <arrow> <attr>加压蒸汽缓冲：</attr> %steam-buffer%
      <arrow> <attr>每次加速耗加压汽：</attr> %steam-per-operation%
    waila: "柴油涡轮 | 加压蒸汽 %steam-bar% | 目标 %targets%/%boosted% | %state%"

  pylon_universal_turbine:
    name: "通用 Pylon 涡轮"
    lore: |-
      <arrow> 加速 Pylon/Rebar 所有非液压、非柴油的处理机器
      <arrow> 支持：手动岩心钻、改良型岩心钻、校准仪、粗合金炉、砂轮、冲压机、微光祭坛、冶炼炉燃烧器、窑炉
      <arrow> 同时驱动上限：3 台
      <arrow> <attr>扫描半径：</attr> %scan-radius%
      <arrow> <attr>蒸汽缓冲：</attr> %steam-buffer%
      <arrow> <attr>每次加速耗汽：</attr> %steam-per-operation%
    waila: "通用 Pylon 涡轮 | 蒸汽 %steam-bar% | 目标 %targets%/%boosted% | %state%"

  precision_steam_turbine:
    name: "精密全能涡轮"
    lore: |-
      <arrow> 加速所有类型机器，覆盖范围最广
      <arrow> 同时驱动上限：6 台，扫描半径 5 格
      <arrow> <gold>破顶叠加：</gold><gray>无视涡轮叠加上限，加速永远生效
      <arrow> <gold>协同效率：</gold><gray>每多加速 1 台耗汽 -5%，满载时降至 65%
      <arrow> <gold>消耗过热蒸汽</gold>
      <arrow> <attr>扫描半径：</attr> %scan-radius%
      <arrow> <attr>过热蒸汽缓冲：</attr> %steam-buffer%
      <arrow> <attr>每次加速耗过热汽：</attr> %steam-per-operation%
    waila: "精密全能涡轮 | 过热蒸汽 %steam-bar% | 目标 %targets%/%boosted% | %state%"

  steam_blower:
    name: "蒸汽鼓风器"
    lore: |-
      <arrow> 用蒸汽推动强风，后续可用于鼓风增产和燃烧强化
      <arrow> <attr>蒸汽缓冲：</attr> %steam-buffer%
    waila: "蒸汽鼓风器 | 蒸汽 %steam-bar%"

  steam_sterilizer:
    name: "蒸汽灭菌箱"
    lore: |-
      <arrow> 使用高温蒸汽净化腐败材料、菌类和树脂
      <arrow> 可产出无菌生质和硫化橡胶
      <arrow> <attr>蒸汽缓冲：</attr> %steam-buffer%
    waila: "蒸汽灭菌箱 | 蒸汽 %steam-bar%"

  steam_steeping_vat:
    name: "蒸汽浸煮桶"
    lore: |-
      <arrow> 用热水和蒸汽浸煮植物、根系与黏性材料
      <arrow> 可产出植物纤维、蒸汽纸浆和粗树脂
      <arrow> <attr>蒸汽缓冲：</attr> %steam-buffer%
    waila: "蒸汽浸煮桶 | 蒸汽 %steam-bar%"

  steam_washing_trough:
    name: "蒸汽洗选槽"
    lore: |-
      <arrow> 用热水和蒸汽洗选矿物与沉积物
      <arrow> 可产出锌精矿、黏土和少量矿物副产
      <arrow> <attr>蒸汽缓冲：</attr> %steam-buffer%
    waila: "蒸汽洗选槽 | 蒸汽 %steam-bar%"

  steam_press:
    name: "蒸汽冲压机"
    lore: |-
      <arrow> 用高压蒸汽推动柱塞，把材料压制成板与片
      <arrow> 多方块结构：放置机器，下方留一格空气，再放铁块
      <arrow> 右键铁块投放材料；产物以掉落物形式出现在铁块处
      <arrow> Shift+右键铁块可一次性放入主手所有物品
      <arrow> <attr>蒸汽缓冲：</attr> %steam-buffer%
    waila: "蒸汽冲压机 | 蒸汽 %steam-bar% | %state%"

  steam_grinder:
    name: "蒸汽研磨机"
    lore: |-
      <arrow> 用蒸汽推动磨盘高速旋转，干法粉碎岩石与金属锭
      <arrow> 可产出石英、Pylon 各类金属粉末
      <arrow> <attr>蒸汽缓冲：</attr> %steam-buffer%
    waila: "蒸汽研磨机 | 蒸汽 %steam-bar%"

  steam_pressurized_furnace:
    name: "蒸汽加压炉"
    lore: |-
      <arrow> 利用高压蒸汽将多种材料压制成高级合金粉末
      <arrow> 可制作因瓦、硬铝、钨、锰钢和锰青铜粉末
      <arrow> <attr>蒸汽缓冲：</attr> %steam-buffer%
    waila: "蒸汽加压炉 | 蒸汽 %steam-bar% | %state%"

  steam_assembly_bench:
    name: "蒸汽装配台"
    lore: |-
      <arrow> 根据 3×3 模板自动合成原版工作台配方
      <arrow> 需要 3×1×3 多方块结构：主方块 + 四角青铜块
      <arrow> 汽动输入会填充材料缓存，汽动输出会抽取成品
      <arrow> <attr>过热蒸汽缓存：</attr> %steam-buffer%
      <arrow> <attr>每次合成耗汽：</attr> %steam-per-craft%
    waila: "蒸汽装配台 | %structure% | 过热蒸汽 %steam-bar% | %state%"

  steam_science_interface:
    name: "蒸汽科研接口"
    lore: |-
      <arrow> 燃烧普通蒸汽分析样品，转化为研究点数
      <arrow> 右键领取累计的研究点数
      <arrow> <attr>蒸汽缓存:</attr> %steam-buffer%
      <arrow> <attr>暂存上限:</attr> %max-points%
    waila: "蒸汽科研接口 | 蒸汽 %steam-bar% | 材%material-pts% 生%biology-pts% 精%precision-pts% 化%chemistry-pts% | %state%"

  steam_canister_bench:
    name: "蒸汽装备改装台"
    lore: |-
      <arrow> 给蒸汽武器/工具/盔甲安装或拆卸蒸汽罐
      <arrow> 安装蒸汽罐后装备才能蓄汽、激活蒸汽能力
      <arrow> 更换更大的罐可提升装备蒸汽容量上限
    waila: "蒸汽装备改装台"

  steam_charging_chamber:
    name: "蒸汽充汽舱"
    lore: |-
      <arrow> 多方块充能室：主方块居中层，底层锰钢块+四角锰青铜块，顶层倒置青铜楼梯+四角锰青铜块
      <arrow> <aqua>加压蒸汽</aqua>管道从顶层楼梯上方接入，玩家进入帧内自动充汽
      <arrow> <aqua>消耗加压蒸汽</aqua>
      <arrow> <attr>加压蒸汽缓存：</attr> %steam-buffer%
      <arrow> <attr>充汽速率：</attr> %charge-rate-per-tick%
    waila: "蒸汽充汽舱 | %structure% | 加压蒸汽 %steam-bar%"

  steam_heating_chamber:
    name: "蒸汽加热室"
    lore: |-
      <arrow> 把普通蒸汽再加热为过热蒸汽，比例 3:1
      <arrow> 连接基础锅炉与高级蒸汽机械的桥梁设备
      <arrow> <attr>蒸汽缓存:</attr> %steam-buffer%
      <arrow> <attr>过热蒸汽缓存:</attr> %superheated-buffer%
    waila: "蒸汽加热室 | %state%"

  steam_compressor:
    name: "蒸汽加压机"
    lore: |-
      <arrow> 将普通蒸汽加压为加压蒸汽，比例 2:1
      <arrow> 为汽动货运系统提供动力的前提设备
      <arrow> <attr>蒸汽缓存:</attr> %steam-buffer%
      <arrow> <attr>加压蒸汽缓存:</attr> %pressurized-buffer%
      <arrow> <attr>每周期输入:</attr> %input%
      <arrow> <attr>每周期输出:</attr> %output%
    waila: "蒸汽加压机 | 蒸汽 %steam-bar% | 加压蒸汽 %pressurized-bar% | %state%"

  pneumatic_cargo_hub:
    name: "汽动货运站"
    lore: |-
      <arrow> 多方块结构底座——正上方必须放置一台蒸汽弹射器
      <arrow> 缺少弹射器时会以半透明台阶投影提示放置位置
      <arrow> 当前首件物品会以全息方式悬浮在弹射器顶端
      <arrow> 每 <attr>%interval%s</attr> 批量发货一次；批量大小（1–64）在 GUI 中调整
      <arrow> 目标货运站的上方也必须有弹射器才能接收物品
      <arrow> 打开 GUI 点击目标槽进入选择模式，再在世界中左键点击目标货运站完成绑定
      <arrow> <attr>加压蒸汽缓存:</attr> %pressurized-buffer%
      <arrow> <attr>每件耗气:</attr> %steam-per-item%
      <arrow> <attr>最大距离:</attr> %max-distance%
    waila: "汽动货运站 | 加压蒸汽 %pressurized-bar% | 弹射器 %catapult% | 目标 %target% | 批量 %batch% | %state%"

  steam_catapult:
    name: "蒸汽弹射器"
    lore: |-
      <arrow> 汽动货运站多方块结构的上方组件——必须放置在货运站正上方
      <arrow> 当下方货运站发货时，由本机执行抛物线弹射动画
    waila: "蒸汽弹射器 | %state%"

  steam_sorter:
    name: "蒸汽分拣机"
    lore: |-
      <arrow> 消耗<white>加压蒸汽</white>，将输入槽物品按方向分发到汽动网络
      <arrow> 每个面可直连<white>汽动输入端</white>，或通过导管连接到<white>汽动输入端</white>
      <arrow> 过滤槽（6格）对应六个面：有过滤时只推对应类型，无过滤时轮询空位
      <arrow> <attr>加压蒸汽缓存:</attr> %steam-buffer%
      <arrow> <attr>每个物品耗气:</attr> %steam-per-item%
      <arrow> <attr>每 tick 最多推送:</attr> %items-per-tick% 个
    waila: "蒸汽分拣机 | 加压蒸汽 %steam-bar% | %state%"

  steam_discharge_hopper:
    name: "蒸汽卸料斗"
    lore: |-
      <arrow> 从正上方容器吸取物品，推入正下方容器
      <arrow> 速度远超原版漏斗，消耗蒸汽维持气压
      <arrow> <attr>蒸汽缓存:</attr> %steam-buffer%
      <arrow> <attr>每个物品耗气:</attr> %steam-per-item%
      <arrow> <attr>每 tick 最多转移:</attr> %items-per-tick% 个
    waila: "蒸汽卸料斗 | 蒸汽 %steam-bar% | %state%"

  pneumatic_duct:
    name: "汽动导管"
    lore: |-
      <arrow> 连接弹射器、分拣机与卸料斗的加压气管段
      <arrow> 相邻导管段与货运机器自动连通，形成货运网络
    waila: "汽动导管"

  pneumatic_input:
    name: "汽动输入端"
    lore: |-
      <arrow> 汽动导管网络的终点——接收网络推送的物品并插入朝向方向的相邻容器
      <arrow> 无需消耗蒸汽，自动转发内部缓冲中的物品
    waila: "汽动输入端"

  pneumatic_output:
    name: "汽动输出端"
    lore: |-
      <arrow> 汽动网络的<white>入口适配器</white>，内置 <white>9 格存储仓</white>
      <arrow> 每 tick 自动从来源侧相邻容器补货到存储仓
      <arrow> 每 <white>%interval% tick</white> 从存储仓取出最多 <white>%extract% 个</white>物品批量发送到网络
      <arrow> 来源侧贴住原版容器或 Rebar 机器抽取物品；网络侧直连或通过导管连接<white>汽动输入端</white>
    waila: "汽动输出端 | 每 %interval% tick 发送 %extract% 个 | %state%"

  production_line_inlet:
    name: "产线入口"
    lore: |-
      <arrow> 蒸汽产线的物料入口，内置 <white>7 格原料槽</white>和 <white>7 格燃料槽</white>
      <arrow> 汽动网络（ingredient/fuel INPUT 组）或玩家可直接放入物品
      <arrow> 每 tick 推送原料；燃料支持轮询或单目标绑定模式
      <arrow> <aqua>耗汽驱动</aqua>：从<white>背面</white>接入<white>加压蒸汽</white>，物品每向下游推进一跳消耗固定量；缺汽则整线停摆
      <arrow> 兼容原版熔炉、高炉、烟熏炉作为产线中间机器
    waila_idle: "产线入口 | 未激活"
    waila: "产线入口 #%number% | %state% | 制作人：%creator%"

  production_line_buffer_chest:
    name: "产线缓存箱"
    lore: |-
      <arrow> 蒸汽产线的中间缓存节点，内置 <white>27 格缓存</white>
      <arrow> 接收上一步工序产物，再尝试把下游能接收的物品送入下一步
      <arrow> 可在 GUI 切换推送模式：原料槽 / 燃料槽 / 不推送
      <arrow> 适合放在 Pylon 磨石等多产物机器后，避免副产物堵塞主线
    waila_idle: "产线缓存箱 | 未激活"
    waila: "产线缓存箱 #%number% | %state% | 制作人：%creator%"

  auto_production_module:
    name: "自动生产模组"
    lore: |-
      <arrow> 产线入口专用调校升级
      <arrow> 安装后，入口每 tick 自动对产线内<white>需要手动触发</white>的机器执行右键操作
      <arrow> 支持 Pylon 磨石、混合锅等手动触发机器
      <arrow> 支持产线内的<white>原版合成器</white>：当所有参与配方的格子物品数量 > 1 时，每秒自动触发一次合成
      <arrow> 通过精密调校仪右键产线入口，在升级页面安装到升级槽

  production_line_outlet:
    name: "产线出口"
    lore: |-
      <arrow> 蒸汽产线的成品出口，内置 9 格缓冲仓
      <arrow> 接收产线末台机器推来的成品
      <arrow> 汽动网络（OUTPUT 组）或玩家可从缓冲仓取走成品
    waila_idle: "产线出口 | 未激活"
    waila: "产线出口 #%number% | %state% | 制作人：%creator%"

  production_line_blueprint:
    name: "产线蓝图"
    lore: |-
      <arrow> 手持此道具配置蒸汽产线
      <arrow> 右键<white>产线入口</white>开始配置
      <arrow> 依次左键各蒸汽加工机器（必须共线紧密排列）
      <arrow> 左键<white>产线出口</white>完成配置并激活产线
      <arrow> Shift + 右键任意方块取消当前配置

  pneumatic_line_valve:
    name: "汽动产线阀"
    lore: |-
      <arrow> <white>逻辑→产线桥接</white>：以蒸汽压力控制物品通断
      <arrow> 放置在产线中；把锅炉/逻辑门等持蒸汽方块直接贴在信号面（绿点）
      <arrow> 信号 ≥ 阈值 → 物品放行；低于 → 物品暂存
      <arrow> 阈值和信号面可在 GUI 中调节
      <arrow> <red>需同时解锁蒸汽货运与汽动逻辑两项研究
    waila: "汽动产线阀 | %state%"

  pneumatic_line_sensor:
    name: "汽动产线传感器"
    lore: |-
      <arrow> <white>产线→逻辑桥接</white>：物品经过或产线状态变化时输出蒸汽
      <arrow> 放置在产线中；物品透明通过
      <arrow> 模式：<white>脉冲</white>（物品经过）/ <white>堵塞</white> / <white>空闲</white>
      <arrow> 模式和蒸汽类型可在 GUI 中调节；信号从任意相邻面都可读取
      <arrow> <red>需同时解锁蒸汽货运与汽动逻辑两项研究
    waila: "汽动产线传感器 | %mode% | %state%"

  steam_robot:
    name: "蒸汽机器人"
    lore: |-
      <arrow> 以铜傀儡为底座的自主行动机器人
      <arrow> 右键方块在其上方部署一台（满汽）
      <arrow> 在部署点周围巡游，<white>行动消耗内置蒸汽</white>；耗尽则<red>缺汽停摆</red>
      <arrow> 注视机器人查看蒸汽余量（WAILA）
      <arrow> <white>潜行 + 右键</white> 机器人可拆除并回收物品
      <arrow> <yellow>后续将加入：充汽舱充能、采矿/砍树/搬运

  pneumatic_distributor:
    name: "汽动分发器"
    lore: |-
      <arrow> 消耗加压蒸汽，将输入槽物品按方向分发到汽动网络
      <arrow> 每个面可直连<white>汽动输入端</white>，或通过导管连接到<white>汽动输入端</white>
      <arrow> 支持 1–6 个输出方向（北/南/东/西/上/下），可在 GUI 中逐一启用/禁用
      <arrow> 多方向启用时轮询均衡分发
      <arrow> <attr>加压蒸汽缓存:</attr> %pressurized-buffer%
      <arrow> <attr>每个物品耗气:</attr> %steam-per-item%
      <arrow> <attr>每 tick 最多发送:</attr> %items-per-tick% 个
    waila: "汽动分发器 | 加压蒸汽 %pressurized-bar% | 已启用 %enabled-directions% 方向 | %state%"

  steam_precision_mill:
    name: "蒸汽精密铣床"
    lore: |-
      <arrow> 向高速铣头持续注入过热蒸汽，将合金锭铣削为精密机械零件
      <arrow> 需要蒸汽加热室提供过热蒸汽
      <arrow> 多方块：在机器正下方横向铺设三个 Pylon 钢块
      <arrow> 典型产物：精密齿轮、精密阀门、散热片
      <arrow> <attr>过热蒸汽缓冲：</attr> %steam-buffer%
    waila: "蒸汽精密铣床 | 过热蒸汽 %steam-bar% | %state%"

  # 精密铣床产物
  precision_foundry:
    name: "精密铸造炉"
    lore: |-
      <arrow> 使用金属、助熔剂与过热蒸汽直接成型合金锭
      <arrow> 跳过粉末到烧炼流程，适合高阶合金产线
      <arrow> 汽动输入会填充材料缓存，汽动输出会抽取成品锭
      <arrow> <attr>过热蒸汽缓存：</attr> %steam-buffer%
    waila: "精密铸造炉 | 过热蒸汽 %steam-bar% | %state%"

  precision_catalytic_reactor:
    name: "精密催化反应釜"
    lore: |-
      <arrow> 消耗催化芯合成高级材料
      <arrow> 可产出钯合金锭、高分子聚合物等全新材料
      <arrow> 汽动输入会填充反应物，汽动输出会抽取产物
      <arrow> <attr>过热蒸汽缓存：</attr> %steam-buffer%
    waila: "精密催化反应釜 | 过热蒸汽 %steam-bar% | %state%"

  heavy_impact_crusher:
    name: "重型冲击破碎机"
    lore: |-
      <arrow> 锰钢锻造的高耐磨破碎机，铣削刀片作为冲击头，专门处理硬质方块与矿物
      <arrow> 与蒸汽研磨机互补：研磨机出细粉，破碎机出粗碎与双倍矿
      <arrow> 装入 Pylon 联动模组后还可执行磨石配方（更慢更耗汽，体现重型定位）
      <arrow> <attr>过热蒸汽缓存：</attr> %steam-buffer%
    waila: "重型冲击破碎机 | 过热蒸汽 %steam-bar% | %state%"

  hydraulic_forge:
    name: "液压锻造机"
    lore: |-
      <arrow> 锻造钢板构成的高强度锻造平台，液压驱动精密成型
      <arrow> 高压管件、法兰、活塞、密封件、锻造钢板的核心来源
      <arrow> <attr>过热蒸汽缓存：</attr> %steam-buffer%
    waila: "液压锻造机 | 过热蒸汽 %steam-bar% | %state%"

  precision_crystallizer:
    name: "精密结晶炉"
    lore: |-
      <arrow> 因瓦合金恒温壳体维持长时间稳定温度
      <arrow> 慢速将低品矿/粉末/碎片结晶成高纯锭与原版宝石
      <arrow> 不复制材料，按提纯比转化（4 粉 → 1 锭、4 粗矿 → 1 钢锭）
      <arrow> <attr>过热蒸汽缓存：</attr> %steam-buffer%
    waila: "精密结晶炉 | 过热蒸汽 %steam-bar% | %state%"

  precision_centrifuge:
    name: "精密离心机"
    lore: |-
      <arrow> 硬铝合金转子高速旋转，精密轴承支撑，按密度加权随机分离混合物
      <arrow> 处理样品/废料/复合粉末，每次产出加权随机的多种产物之一
      <arrow> 给样品系列、机器废屑等"模糊输入"提供高级回收路线
      <arrow> 多方块：机器两侧各 2 根、上下角各 2 根 Pylon 钢支撑梁（共 8 根）
      <arrow> <attr>过热蒸汽缓存：</attr> %steam-buffer%
    waila: "精密离心机 | 过热蒸汽 %steam-bar% | %state%"

  high_pressure_pipe:
    name: "高压管件"
    lore: <arrow> 锰青铜锻造的耐磨耐压管段，液压管路与高压气路的标准件

  high_pressure_flange:
    name: "高压法兰"
    lore: |-
      <arrow> 因瓦合金锻造的低膨胀连接件
      <arrow> 在温差大的工况下仍能保持密封

  hydraulic_piston:
    name: "液压活塞"
    lore: |-
      <arrow> 锰青铜锻造的耐磨往复运动件
      <arrow> 液压执行器的核心组件

  hydraulic_seal:
    name: "液压密封件"
    lore: |-
      <arrow> 硫化橡胶高压锻入金属壳体形成的复合密封
      <arrow> 用于活塞与缸体之间的高压密封

  forged_plate:
    name: "锻造钢板"
    lore: |-
      <arrow> 高压锻造均化的高密度结构板
      <arrow> 大型机械的承力外壳与基础结构件

  machine_calibrator:
    name: "<gray>精密调校仪"
    lore: |-
      <arrow> 右键单击机器以打开升级槽

  upgrade_module_energy_save:
    name: "<aqua>节能模组"
    lore: |-
      <arrow> 蒸汽消耗降低 20%
      <arrow> 最多可叠加降低 80%

  upgrade_module_range:
    name: "<light_purple>范围模组"
    lore: |-
      <arrow> 涡轮专用：每个模组扫描半径 +1 格
      <arrow> 让涡轮能加速更远处的机器

  upgrade_module_boost:
    name: "<gold>增幅模组"
    lore: |-
      <arrow> 涡轮专用：每次操作额外 +1 加速 tick
      <arrow> 每台涡轮仅可装配 1 个（不可叠加）

  upgrade_module_pylon_compat:
    name: "<aqua>Pylon 联动模组"
    lore: |-
      <arrow> 解锁该机器对 Pylon 配方的支持
      <arrow> 研磨机：磨石配方
      <arrow> 重型冲击破碎机：磨石配方（更高蒸汽消耗）
      <arrow> 浸煮槽：粗合金熔炉配方
      <arrow> 精密铸造炉：成型 / 弯管 / 台锯配方
      <arrow> 精密催化反应釜：窑炉配方（仅物品输出）

  upgrade_module_auto_input:
    name: "<green>自动进料模组"
    lore: |-
      <arrow> 自动从所有相邻容器中拉取物品到输入槽
      <arrow> <red>与自动出料模组互斥，不可同时装配

  upgrade_module_auto_output:
    name: "<red>自动出料模组"
    lore: |-
      <arrow> 自动将输出槽物品推送到所有相邻容器
      <arrow> <red>与自动进料模组互斥，不可同时装配

  upgrade_module_bulk:
    name: "<gold>批量加工模组"
    lore: |-
      <arrow> 配方完成时若原料充足，额外产出一份
      <arrow> 每个模组增加一次额外产出尝试

  precision_gear:
    name: "精密齿轮"
    lore: |-
      <arrow> 因瓦合金铣削而成的低热膨胀传动齿轮
      <arrow> 中期机器的核心传动零件

  precision_screw:
    name: "精密螺杆"
    lore: |-
      <arrow> 因瓦合金铣削的高精度螺纹杆
      <arrow> 用于精密定位和进给机构

  precision_valve:
    name: "精密阀门"
    lore: |-
      <arrow> 钨合金铣削的耐磨精密控制阀
      <arrow> 用于高压流体的精确调节

  wear_plate:
    name: "耐磨衬板"
    lore: |-
      <arrow> 锰钢铣削的高耐磨防护板
      <arrow> 用于机器内壁保护和摩擦面强化

  heat_sink:
    name: "散热片"
    lore: |-
      <arrow> 硬铝合金铣削的轻质高效散热结构件
      <arrow> 用于高热负荷机器的散热模块

  milling_blade:
    name: "铣削刀片"
    lore: |-
      <arrow> 锰钢制成的高硬度铣刀刃
      <arrow> 铣床的核心耗材，也是中期机器的制造材料

  catalyst_core:
    name: "催化芯"
    lore: |-
      <arrow> 钯金精密铣削的稀有催化核心
      <arrow> 用于高级化学反应和精密合成流程

  precision_bearing:
    name: "精密轴承"
    lore: |-
      <arrow> 钢合金铣削的高速旋转承载件
      <arrow> 减少机器内部摩擦，提升传动效率

  palladium_alloy_ingot:
    name: "钯合金锭"
    lore: |-
      <arrow> 由催化反应稳定成型的耐热钯基合金
      <arrow> 用于后期精密自动化与高温结构件

  high_polymer:
    name: "高分子聚合物"
    lore: |-
      <arrow> 由纤维、硫化橡胶和催化芯合成的致密聚合物
      <arrow> 可用于密封、绝缘和高级反应组件

  sequenced_workpiece:
    name: "序列工件"
    lore: |-
      <arrow> 用于多步骤产线的带数据半成品
      <arrow> 耐久条显示当前工序进度
      <arrow> 可由汽动自动化在匹配机器之间转运
    tooltip:
      header: "<gray>蒸汽工坊 · 工序中间品"
      line: "<dark_gray>工序：<gold>%line%"
      step: "<dark_gray>步骤：<aqua>%step% / %steps%"
    palladium_alloy:
      line_name: "钯合金"
      step_1:
        next: "<dark_gray>下一步：<gray>精密熔炉 + 矿物熔剂 → 粗炼钯合金锭"
      step_2:
        next: "<dark_gray>下一步：<gray>精密铣床 → 校准钯合金毛坯"
      step_3:
        next: "<dark_gray>下一步：<gray>精密熔炉 + 矿物熔剂 → 钯合金锭（成品）"
    flight_core:
      line_name: "蒸汽飞行核心"
      step_1:
        next: "<dark_gray>下一步：<gray>精密熔炉 + 矿物熔剂 + 加热线圈 → 粗炼飞行核心"
      step_2:
        next: "<dark_gray>下一步：<gray>精密铣床 → 校准飞行核心毛坯"
      step_3:
        next: "<dark_gray>下一步：<gray>装配台 + 喷射喷嘴 + 精密轴承 → 蒸汽飞行核心（成品）"

  palladium_workpiece_1:
    name: "<aqua>活化钯合金基体"
  palladium_workpiece_2:
    name: "<gold>粗炼钯合金锭"
  palladium_workpiece_3:
    name: "<yellow>校准钯合金毛坯"

  jet_nozzle:
    name: "喷射喷嘴"
    lore: |-
      <arrow> 钨合金高压喷射口，飞行装备的推进部件
      <arrow> 用于合成蒸汽飞行核心与钨级飞行护甲
  steam_flight_core:
    name: "<aqua>蒸汽飞行核心"
    lore: |-
      <arrow> 经催化反应、熔炼、精密铣削与装配四道工序锻造的飞行动力核心
      <arrow> 钨蒸汽胸甲的关键部件，赋予全套钨甲喷气飞行能力
  flight_core_workpiece_1:
    name: "<aqua>活化飞行合金基体"
  flight_core_workpiece_2:
    name: "<gold>粗炼飞行核心"
  flight_core_workpiece_3:
    name: "<yellow>校准飞行核心毛坯"

  turbine_rotor:
    name: "涡轮转子"
    lore: |-
      <arrow> 由钯合金、精密轴承、耐磨板与高压法兰装配的高速转子
      <arrow> 精密蒸汽涡轮的核心运动部件

  steam_distillation_tower:
    name: "蒸汽精馏塔"
    lore: |-
      <arrow> 利用过热蒸汽进行物料精馏的模块化高塔
      <arrow> 堆叠 1-4 个塔节 + 冷凝顶盖；段数越多可解锁更复杂的配方
      <arrow> <attr>蒸汽缓存:</attr> %steam-buffer%
    waila: "蒸汽精馏塔 | %structure% | 蒸汽 %steam-bar% | %state%"

  distillation_tower_section:
    name: "精馏塔节"
    lore: <arrow> 由玻璃与殷钢拼成的塔层，可为精馏塔增加一段精馏面

  distillation_condenser:
    name: "精馏冷凝顶盖"
    lore: <arrow> 完成蒸汽精馏塔结构所需的紫铜顶盖

  steam_vortex_tube:
    name: "蒸汽涡流分离器"
    lore: |-
      <arrow> 北面接<white>过热蒸汽</white>输入，南面输出<white>加压蒸汽</white>，东面输出<white>蒸馏水</white>
      <arrow> 每周期消耗 %input% 过热蒸汽，产出 %pressurized% 加压蒸汽 + %water% 蒸馏水
      <arrow> 约 10% 转化损耗；蒸馏水可用于下游化学配方
      <arrow> 是将过热蒸汽升级为加压蒸汽的唯一途径

  pneumatic_logic_gate:
    name: "汽动逻辑门"
    lore: |-
      <arrow> <white>正前输出</white>，<white>正后 + 左 + 右 = 输入</white>；蒸汽 ≥ 阈值 = HIGH
      <arrow> GUI 选门类型（AND/OR/XOR/NOT）；阈值可调（1–1000 mB）
      <arrow> 逻辑成立时蒸汽搬入自身缓存供给下游，可串联
    waila: "汽动逻辑门 <dark_gray>|</dark_gray> %mode% <dark_gray>|</dark_gray> 过滤 %kind% <dark_gray>|</dark_gray> %state%"

  pneumatic_differential_gate:
    name: "汽动差压门"
    lore: |-
      <arrow> <white>正前输出</white>，<white>正后 = 源A</white>，<white>右侧 = 参考B</white>
      <arrow> A − B ≥ 阈值时放行；防止回流浪费
      <arrow> 三种蒸汽独立计算；阈值 GUI 可调
    waila: "汽动差压门 <dark_gray>|</dark_gray> 阈值 %threshold% <dark_gray>|</dark_gray> 过滤 %kind% <dark_gray>|</dark_gray> %state%"

  pneumatic_pulser:
    name: "汽动脉冲器"
    lore: |-
      <arrow> <white>正后充汽</white>，<white>正前脉冲输出</white>
      <arrow> 蓄能达阈值后释放脉冲；脉冲量 GUI 可调
      <arrow> 顶部重复器显示蓄能进度
    waila: "汽动脉冲器 <dark_gray>|</dark_gray> 蓄能 %charge%% <dark_gray>|</dark_gray> 过滤 %kind% <dark_gray>|</dark_gray> %state%"

  pneumatic_latch:
    name: "汽动锁存器"
    lore: |-
      <arrow> <white>正前输出</white>，<white>正后供汽</white>，<white>左SET</white>，<white>右RESET</white>
      <arrow> SET 有汽→锁住持续供汽；RESET 有汽→解锁
      <arrow> 无信号时维持上次状态；RESET 优先
    waila: "汽动锁存器 <dark_gray>|</dark_gray> 过滤 %kind% <dark_gray>|</dark_gray> %state%"

  steam_oscillator:
    name: "蒸汽振荡器"
    lore: |-
      <arrow> 从输入面吸入蒸汽蓄压，达到上阈值后向输出面<white>喷发 %ticks% tick</white>
      <arrow> 喷发结束或内压降至下阈值后重新蓄压，形成周期性脉冲
      <arrow> 供汽越快，频率越高；无蒸汽则停摆
      <arrow> 输出面接蒸汽机器或汽动逻辑门，可驱动节拍自动化
      <arrow> <attr>上阈值:</attr> %threshold% <attr>喷发时长:</attr> %ticks% tick
    waila: "蒸汽振荡器 | %fluid% %pressure-bar% | %state%"

  pneumatic_gate_valve:
    name: "汽动截止阀"
    lore: |-
      <arrow> 嵌入<white>汽动导管</white>链中段，方向与导管连接方向一致
      <arrow> 无红石信号时<white>常开</white>，物品正常通过；接收红石信号后立即关闭
      <arrow> 关闭时导管网络视其为断开，物品不会在阀门处堆积
      <arrow> 配合蒸汽压力传感器或逻辑门可实现「有汽才放行」联动
    waila: "汽动截止阀 | %state%"

  steam_pressure_transducer:
    name: "蒸汽压力传感器"
    lore: |-
      <arrow> 贴在蒸汽机器侧面，在 GUI 中选择<white>读取面</white>和蒸汽档位
      <arrow> 将相邻机器的蒸汽填充比例映射为 <white>0–15 模拟红石信号</white>
      <arrow> 在传感器侧面放置<white>红石比较器</white>即可直接读出信号强度
      <arrow> 是蒸汽体系中唯一的真模拟量红石输出
    waila: "蒸汽压力传感器 | %fluid% %pressure-bar% | 红石 %level%"

  steam_difference_engine:
    name: "蒸汽差分机"
    lore: |-
      <arrow> 致敬巴贝奇差分机：可编程<white>最多 %order% 阶</white>差分寄存器
      <arrow> 每个工作冲程消耗 <white>%steam%</white> 蒸汽，把各阶差分逐级累加，吐出序列下一项
      <arrow> 一阶=等差斜坡，二阶=抛物线，三阶=三次曲线；所有寄存器模回绕，序列循环
      <arrow> 输出三选一：<white>0–15 模拟红石</white> / <white>蒸汽脉冲量</white> / <white>分频脉冲间隔</white>
      <arrow> 让产线节奏渐快渐慢、生成非线性供汽波形、或作分频器
    waila: "蒸汽差分机 | %mode% | 序列值 %value% | %state%"

  pneumatic_pressure_module:
    name: "汽动管道模块"
    lore: |-
      <arrow> 嵌入<white>汽动导管</white>链中段，借鉴 PneumaticCraft 管道模块
      <arrow> 在 GUI 中三选一：<white>流量计</white> / <white>限流阀</white> / <white>溢流报警</white>
      <arrow> 流量计：统计过站物品速率 → <white>0–15 模拟红石</white>（侧面接比较器）
      <arrow> 限流阀：限制每窗口通过的物品数，超额自动断开网络
      <arrow> 溢流报警：下游满载导致传输被拒时输出红石报警
    waila: "汽动管道模块 | %mode% | %detail%"

  # 蒸馏副产物与中间产物
  refined_resin:
    name: "精炼树脂"
    lore: |-
      <arrow> 经过精馏除杂的高纯度树脂
      <arrow> 用于制作高级密封件与弹性元件

  plant_essence:
    name: "植物精华"
    lore: |-
      <arrow> 从植物原料中浓缩提取的有机液
      <arrow> 用于生物学研究与化学制备

  distilled_water_vial:
    name: "蒸馏水瓶"
    lore: |-
      <arrow> 一瓶纯净蒸馏水
      <arrow> 倒入流体输入槽用于化学配方

  mineral_leachate_vial:
    name: "矿物浸出液瓶"
    lore: <arrow> 装瓶后的矿物浸出液，可继续加工

  waste_acid_vial:
    name: "废酸瓶"
    lore: |-
      <arrow> 矿物精馏副产的废酸
      <arrow> 在精馏塔中与矿物助熔剂中和，可回收为矿物浸出液瓶

  mineral_concentrate:
    name: "矿物浓缩物"
    lore: |-
      <arrow> 由助剂与浸出液精馏出的高密度矿物饼
      <arrow> 高纯冶金的前置原料

  fiber_residue:
    name: "纤维残渣"
    lore: |-
      <arrow> 蒸汽精馏植物纤维后剩下的固体浆渣
      <arrow> 在精馏塔中再次蒸馏可分解为骨粉和矿物助熔剂

  # 研究样本
  mineral_analysis_sample:
    name: "矿物分析样本"
    lore: |-
      <arrow> 为蒸汽科研接口准备的矿物标本
      <arrow> 产出 <green>5</green> 点材料学研究点数
      <arrow> 产出 <green>2</green> 点全局研究点数

  organic_analysis_sample:
    name: "有机分析样本"
    lore: |-
      <arrow> 为蒸汽科研接口准备的有机标本
      <arrow> 产出 <green>5</green> 点生物学研究点数
      <arrow> 产出 <green>2</green> 点全局研究点数

  metallurgical_analysis_sample:
    name: "冶金分析样本"
    lore: |-
      <arrow> 为蒸汽科研接口准备的高温合金标本
      <arrow> 产出 <green>7</green> 点精密工程研究点数
      <arrow> 产出 <green>2</green> 点全局研究点数

  fluid_analysis_sample:
