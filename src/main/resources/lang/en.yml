    name: "Tungsten Steam Leggings"
    lore: |-
      <arrow> Heavy leggings built to absorb high-pressure shocks
      <arrow> <gray>Install a canister to show a live pressurized-steam bar
      <arrow> <gray>Worn while charged: no idle cost; high steam use when hit; grants movement speed
      <arrow> <gray>Set skill: <white>💥 Steam Quake</white><dark_gray> (see chestplate)
      <arrow> <gray>Depleted: speed buff stops
  steam_tungsten_boots:
    name: "Tungsten Steam Boots"
    lore: |-
      <arrow> Heavy tungsten alloy shock-absorbing boots
      <arrow> <gray>Install a canister to show a live pressurized-steam bar
      <arrow> <gray>Worn while charged: no idle cost; high steam use when hit; grants movement speed
      <arrow> <gray>Set skill: <white>💥 Steam Quake</white><dark_gray> (see chestplate)
      <arrow> <gray>Depleted: landing protection stops

  # Portable steam energy
  steam_canister_brass:
    name: "Brass Steam Canister"
    lore: |-
      <arrow> Entry-tier portable <aqua>pressurized steam</aqua> storage; install into steam gear as a battery
      <arrow> Charge with <aqua>pressurized steam</aqua> in the Charging Chamber, or while installed in gear
      <arrow> <attr>Capacity:</attr> <aqua>%capacity%</aqua>

  steam_canister_invar:
    name: "Invar Steam Canister"
    lore: |-
      <arrow> Mid-tier portable <aqua>pressurized steam</aqua> storage with reinforced invar casing
      <arrow> Install into steam gear for a higher pressurized steam capacity
      <arrow> <attr>Capacity:</attr> <aqua>%capacity%</aqua>

  steam_canister_tungsten:
    name: "Tungsten Steam Canister"
    lore: |-
      <arrow> Top-tier portable <aqua>pressurized steam</aqua> storage with high-pressure tungsten shell
      <arrow> Install into steam gear for the highest pressurized steam capacity
      <arrow> <attr>Capacity:</attr> <aqua>%capacity%</aqua>

  # Block items
  bronze_boiler:
    name: "Bronze Boiler"
    lore: |-
      <arrow> An entry multiblock boiler reinforced with Pylon bronze
      <arrow> Structure: Pylon bronze blocks on both sides, bronze grating on top, heat below
      <arrow> <attr>Water buffer:</attr> %water-buffer%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Water usage:</attr> %water-per-second%
      <arrow> <attr>Steam output:</attr> %steam-per-second%
    waila: "Bronze Boiler | %structure% | Water %water-bar% | Steam %steam-bar% | %pressure%"

  invar_boiler:
    name: "Invar Boiler"
    lore: |-
      <arrow> A high-efficiency boiler made from low-expansion alloy, using less water
      <arrow> Structure: invar blocks on both sides, Pylon iron support beam on top, heat below
      <arrow> <attr>Water buffer:</attr> %water-buffer%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Water usage:</attr> %water-per-second%
      <arrow> <attr>Steam output:</attr> %steam-per-second%
    waila: "Invar Boiler | %structure% | Water %water-bar% | Steam %steam-bar% | %pressure%"

  manganese_steel_boiler:
    name: "Manganese Steel Boiler"
    lore: |-
      <arrow> A heavy industrial boiler built from wear-resistant steel, produces <white>superheated steam</white>
      <arrow> Structure: manganese steel blocks on both sides, Pylon steel support beam on top, heat below
      <arrow> <attr>Water buffer:</attr> %water-buffer%
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Water usage:</attr> %water-per-second%
      <arrow> <attr>Superheated steam output:</attr> %steam-per-second%
    waila: "Manganese Steel Boiler | %structure% | Water %water-bar% | Superheated Steam %steam-bar% | %pressure%"

  tungsten_boiler:
    name: "Tungsten Boiler"
    lore: |-
      <arrow> A top-end high-temperature boiler, produces <white>superheated steam</white> at extreme throughput
      <arrow> Structure: tungsten blocks on both sides, Pylon refractory bricks on top, heat below
      <arrow> <attr>Water buffer:</attr> %water-buffer%
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Water usage:</attr> %water-per-second%
      <arrow> <attr>Superheated steam output:</attr> %steam-per-second%
    waila: "Tungsten Boiler | %structure% | Water %water-bar% | Superheated Steam %steam-bar% | %pressure%"

  steam_arm:
    name: "Steam Arm"
    lore: |-
      <arrow> Moves items between inventories in a short range
      <arrow> <attr>Range:</attr> %range%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Steam per transfer:</attr> %steam-per-transfer%
    waila: "Steam Arm | %steam-bar% | %state%"

  simple_steam_turbine:
    name: "Simple Steam Turbine"
    lore: |-
      <arrow> Scans nearby furnaces for steam boosting (Basic version)
      <arrow> Supports: Furnaces, Blast Furnaces, Smokers
      <arrow> Max simultaneous targets: 3
      <arrow> <attr>Scan radius:</attr> %scan-radius%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Steam per boost:</attr> %steam-per-operation%
    waila: "Simple Steam Turbine | Steam %steam-bar% | Targets %targets%/%boosted% | %state%"

  basic_processing_turbine:
    name: "Basic Processing Turbine"
    lore: |-
      <arrow> Accelerates basic Steamwork processing machines
      <arrow> Supports: Sterilizer, Steeping Vat, Washing Trough, Press, Grinder, Pressurized Furnace, Distillation Tower, Heating Chamber
      <arrow> Max simultaneous targets: 5
      <arrow> <attr>Scan radius:</attr> %scan-radius%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Steam per boost:</attr> %steam-per-operation%
    waila: "Basic Processing Turbine | Steam %steam-bar% | Targets %targets%/%boosted% | %state%"

  precision_processing_turbine:
    name: "Precision Processing Turbine"
    lore: |-
      <arrow> Accelerates precision Steamwork machines
      <arrow> Supports: Precision Mill, Foundry, Catalytic Reactor, Crystallizer, Centrifuge, Heavy Crusher, Hydraulic Forge
      <arrow> Max simultaneous targets: 3
      <arrow> <gold>Requires superheated steam</gold>
      <arrow> <attr>Scan radius:</attr> %scan-radius%
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Superheated steam per boost:</attr> %steam-per-operation%
    waila: "Precision Processing Turbine | Superheated Steam %steam-bar% | Targets %targets%/%boosted% | %state%"

  hydraulic_turbine:
    name: "Hydraulic Turbine"
    lore: |-
      <arrow> Accelerates Pylon hydraulic series machines
      <arrow> Supports: Hydraulic Breaker, Hammer Head, Mixing Attachment, etc.
      <arrow> Max simultaneous targets: 4
      <arrow> <aqua>Requires pressurized steam</aqua>
      <arrow> <attr>Scan radius:</attr> %scan-radius%
      <arrow> <attr>Pressurized steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Pressurized steam per boost:</attr> %steam-per-operation%
    waila: "Hydraulic Turbine | Pressurized Steam %steam-bar% | Targets %targets%/%boosted% | %state%"

  diesel_turbine:
    name: "Diesel Turbine"
    lore: |-
      <arrow> Accelerates Pylon diesel series machines
      <arrow> Supports: Diesel Breaker, Hammer Head, Mixing Attachment, Palladium Condenser, Biorefinery, etc.
      <arrow> Max simultaneous targets: 4
      <arrow> <aqua>Requires pressurized steam</aqua>
      <arrow> <attr>Scan radius:</attr> %scan-radius%
      <arrow> <attr>Pressurized steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Pressurized steam per boost:</attr> %steam-per-operation%
    waila: "Diesel Turbine | Pressurized Steam %steam-bar% | Targets %targets%/%boosted% | %state%"

  pylon_universal_turbine:
    name: "Pylon Universal Turbine"
    lore: |-
      <arrow> Accelerates Pylon/Rebar non-hydraulic, non-diesel processing machines
      <arrow> Supports: Manual Core Drill, Improved Core Drill, Collimator, Crude Alloy Furnace, Grindstone, Press, Shimmer Altar, Smeltery Burner, Kiln
      <arrow> Max simultaneous targets: 3
      <arrow> <attr>Scan radius:</attr> %scan-radius%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Steam per boost:</attr> %steam-per-operation%
    waila: "Pylon Universal Turbine | Steam %steam-bar% | Targets %targets%/%boosted% | %state%"

  precision_steam_turbine:
    name: "Precision Steam Turbine"
    lore: |-
      <arrow> Accelerates all machine types �?widest coverage
      <arrow> Max simultaneous targets: 6, scan radius: 5 blocks
      <arrow> <gold>Stack Override: </gold><gray>ignores boost stack cap �?boosts always land
      <arrow> <gold>Synergy Scaling: </gold><gray>-5% steam cost per extra target, down to 65% at full load
      <arrow> <gold>Requires superheated steam</gold>
      <arrow> <attr>Scan radius:</attr> %scan-radius%
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Superheated steam per boost:</attr> %steam-per-operation%
    waila: "Precision Steam Turbine | Superheated Steam %steam-bar% | Targets %targets%/%boosted% | %state%"

  steam_sterilizer:
    name: "Steam Sterilizer"
    lore: |-
      <arrow> Cleans rotten materials, fungi, and resin with hot pressurized steam
      <arrow> Produces sterile biomass and vulcanized rubber
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Sterilizer | Steam %steam-bar%"

  steam_steeping_vat:
    name: "Steam Steeping Vat"
    lore: |-
      <arrow> Steeps plants, roots, and sticky materials with hot water and steam
      <arrow> Produces plant fiber, steam pulp, and raw resin
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Steeping Vat | Steam %steam-bar%"

  steam_washing_trough:
    name: "Steam Washing Trough"
    lore: |-
      <arrow> Washes minerals and sediments with hot water and steam
      <arrow> Produces zinc concentrate, clay, and small mineral byproducts
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Washing Trough | Steam %steam-bar%"

  steam_press:
    name: "Steam Press"
    lore: |-
      <arrow> A high-pressure steam piston that presses materials into sheets and boards
      <arrow> Multi-block: place machine, leave one air gap below, then place an Iron Block
      <arrow> Right-click the Iron Block to insert items; output drops at the Iron Block
      <arrow> Shift+Right-click to deposit the entire main-hand stack at once
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Press | Steam %steam-bar% | %state%"

  steam_grinder:
    name: "Steam Grinder"
    lore: |-
      <arrow> A steam-driven grinding wheel that dry-mills stones and metal ingots into dust
      <arrow> Produces quartz and Pylon metal dusts
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Grinder | Steam %steam-bar%"

  steam_pressurized_furnace:
    name: "Steam Pressurized Furnace"
    lore: |-
      <arrow> Compacts materials into advanced alloy dusts using high-pressure steam
      <arrow> Makes invar, duralumin, tungsten, manganese steel, and manganese bronze dusts
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Pressurized Furnace | Steam %steam-bar% | %state%"

  steam_assembly_bench:
    name: "Steam Assembly Bench"
    lore: |-
      <arrow> Automatically crafts vanilla recipes from a 3x3 template
      <arrow> Requires a 3×1×3 structure: main block + 4 bronze blocks at the corners
      <arrow> Pneumatic inputs feed the material buffer; pneumatic outputs extract finished items
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Superheated steam per craft:</attr> %steam-per-craft%
    waila: "Steam Assembly Bench | %structure% | Superheated Steam %steam-bar% | %state%"

  steam_science_interface:
    name: "Steam Science Interface"
    lore: |-
      <arrow> Burns regular steam to analyze samples into research points
      <arrow> Right-click to claim accumulated points
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Stored points cap:</attr> %max-points%
    waila: "Steam Science Interface | Steam %steam-bar% | Mat%material-pts% Bio%biology-pts% Pre%precision-pts% Chem%chemistry-pts% | %state%"

  steam_canister_bench:
    name: "Steam Canister Bench"
    lore: |-
      <arrow> Install or remove steam canisters on steam weapons/tools/armor
      <arrow> Equipment only stores steam & activates abilities once a canister is installed
      <arrow> Swapping in a larger canister raises the equipment's steam capacity
    waila: "Steam Canister Bench"

  steam_charging_chamber:
    name: "Steam Charging Chamber"
    lore: |-
      <arrow> Multiblock: core block in the middle layer, manganese-steel base + manganese-bronze corners below, inverted bronze stair + corners above
      <arrow> Connect <aqua>pressurized steam</aqua> pipe above the top-layer stair; step inside the frame to auto-charge gear
      <arrow> <aqua>Consumes pressurized steam</aqua>
      <arrow> <attr>Pressurized steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Charge rate:</attr> %charge-rate-per-tick%
    waila: "Steam Charging Chamber | %structure% | Pressurized Steam %steam-bar%"

  steam_heating_chamber:
    name: "Steam Heating Chamber"
    lore: |-
      <arrow> Re-heats regular steam into superheated steam at a 3:1 ratio
      <arrow> A bridge between basic boilers and advanced steam machinery
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Superheated buffer:</attr> %superheated-buffer%
    waila: "Steam Heating Chamber | %state%"

  steam_compressor:
    name: "Steam Compressor"
    lore: |-
      <arrow> Compresses regular steam into pressurized steam at a 2:1 ratio
      <arrow> Required to power the pneumatic cargo system
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Pressurized buffer:</attr> %pressurized-buffer%
      <arrow> <attr>Input per cycle:</attr> %input%
      <arrow> <attr>Output per cycle:</attr> %output%
    waila: "Steam Compressor | Steam %steam-bar% | Pressurized %pressurized-bar% | %state%"

  pneumatic_cargo_hub:
    name: "Pneumatic Cargo Hub"
    lore: |-
      <arrow> Multiblock base �?requires a Steam Catapult placed directly on top
      <arrow> A ghost slab projection shows where to place the catapult when missing
      <arrow> The current first item is shown as a hologram on top of the catapult
      <arrow> Sends a batch of items every <attr>%interval%s</attr>; batch size (1�?4) is adjusted in the GUI
      <arrow> Target hub must also have a catapult on top to receive items
      <arrow> Open the GUI and click the target slot to enter selection mode, then left-click the target hub in the world
      <arrow> <attr>Pressurized buffer:</attr> %pressurized-buffer%
      <arrow> <attr>Steam per item:</attr> %steam-per-item%
      <arrow> <attr>Max distance:</attr> %max-distance%
    waila: "Pneumatic Cargo Hub | Pressurized %pressurized-bar% | Catapult %catapult% | Target %target% | Batch %batch% | %state%"

  steam_catapult:
    name: "Steam Catapult"
    lore: |-
      <arrow> Upper module of the Pneumatic Cargo Hub multiblock �?place directly on top of a hub
      <arrow> Performs the parabolic launch animation when the hub below sends a batch
    waila: "Steam Catapult | %state%"

  steam_sorter:
    name: "Steam Sorter"
    lore: |-
      <arrow> Consumes <white>pressurized steam</white> to push items into the pneumatic network
      <arrow> Each face must connect directly to a <white>Pneumatic Input</white> or reach one through ducts
      <arrow> Set filter slots to restrict which items go to which face
      <arrow> Faces with no filter accept any item (round-robin)
      <arrow> <attr>Pressurized steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Steam per item:</attr> %steam-per-item%
      <arrow> <attr>Max items per tick:</attr> %items-per-tick%
    waila: "Steam Sorter | Pressurized %steam-bar% | %state%"

  steam_discharge_hopper:
    name: "Steam Discharge Hopper"
    lore: |-
      <arrow> Draws items from the container above and pushes them into the container below
      <arrow> Far faster than a vanilla hopper �?speed scales with available steam
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Steam per item:</attr> %steam-per-item%
      <arrow> <attr>Max items per tick:</attr> %items-per-tick%
    waila: "Steam Discharge Hopper | Steam %steam-bar% | %state%"

  pneumatic_duct:
    name: "Pneumatic Duct"
    lore: |-
      <arrow> A pressurised pipe segment connecting catapults, sorters and hoppers
      <arrow> Place between machines to form a cargo network
      <arrow> Connects automatically to adjacent duct segments and logistics machines
    waila: "Pneumatic Duct"

  pneumatic_input:
    name: "Pneumatic Input"
    lore: |-
      <arrow> Network endpoint �?receives items pushed by the pneumatic network and inserts them into the adjacent container
      <arrow> No steam required; passively relays buffered items each tick
    waila: "Pneumatic Input"

  pneumatic_output:
    name: "Pneumatic Output"
    lore: |-
      <arrow> Network entry adapter with a built-in <white>9-slot storage</white>
      <arrow> Each tick automatically pulls items from the adjacent source-side container into storage
      <arrow> Every <white>%interval% ticks</white> sends up to <white>%extract% items</white> from storage into the network
      <arrow> Pulls from vanilla containers or Rebar machines on the source side; connects to <white>Pneumatic Input</white> directly or through ducts
    waila: "Pneumatic Output | %extract% items every %interval% ticks | %state%"

  production_line_inlet:
    name: "Production Line Inlet"
    lore: |-
      <arrow> Entry point of a steam production line �?<white>7 ingredient slots</white> + <white>7 fuel slots</white>
      <arrow> Fill via pneumatic network (ingredient/fuel INPUT groups) or manually
      <arrow> Pushes ingredients each tick; fuel supports round-robin or single-target mode
      <arrow> <aqua>Steam-driven</aqua>: pipe <white>pressurized steam</white> into the <white>back</white>; each downstream hop costs a fixed amount, the line halts when out of steam
      <arrow> Compatible with vanilla furnaces, blast furnaces, and smokers as line machines
    waila_idle: "Production Line Inlet | Not configured"
    waila: "Production Line Inlet #%number% | %state% | Creator: %creator%"

  production_line_buffer_chest:
    name: "Production Line Buffer Chest"
    lore: |-
      <arrow> Inline buffer for steam production lines with a <white>27-slot cache</white>
      <arrow> Receives products from the previous step, then tries any accepted item against the next step
      <arrow> Push mode (ingredient / fuel / off) is configurable via the GUI
      <arrow> Useful after machines with mixed outputs, such as the Pylon grindstone
    waila_idle: "Production Line Buffer Chest | Not configured"
    waila: "Production Line Buffer Chest #%number% | %state% | Creator: %creator%"

  auto_production_module:
    name: "Auto-Production Module"
    lore: |-
      <arrow> Calibration upgrade for the Production Line Inlet
      <arrow> When installed, the inlet automatically right-clicks <white>manual-trigger</white> machines each tick
      <arrow> Supports Pylon Grindstone, Mixing Pot, and other manual-trigger machines
      <arrow> Supports <white>vanilla Crafters</white> in the line: auto-crafts once per second when all recipe slots have more than 1 item
      <arrow> Right-click the inlet with a Precision Calibrator to install via the upgrade page

  production_line_outlet:
    name: "Production Line Outlet"
    lore: |-
      <arrow> Exit point of a steam production line �?holds a 9-slot buffer
      <arrow> Receives finished products pushed by the last machine in the line
      <arrow> The pneumatic network (OUTPUT group) or players can retrieve products
    waila_idle: "Production Line Outlet | Not configured"
    waila: "Production Line Outlet #%number% | %state% | Creator: %creator%"

  production_line_blueprint:
    name: "Production Line Blueprint"
    lore: |-
      <arrow> Hold this item to configure a steam production line
      <arrow> Right-click a <white>Production Line Inlet</white> to begin
      <arrow> Left-click each steam processor in order (must be collinear and adjacent)
      <arrow> Left-click a <white>Production Line Outlet</white> to complete and activate the line
      <arrow> Shift + right-click any block to cancel configuration

  pneumatic_line_valve:
    name: "Pneumatic Line Valve"
    lore: |-
      <arrow> <white>Logic → Line bridge</white>: gates item flow by steam pressure
      <arrow> Place in a production line; put a steam-holding block (boiler/logic gate) right against the signal face (green dot)
      <arrow> Signal ≥ threshold → items pass through; below → items held
      <arrow> Threshold and signal face adjustable in GUI
      <arrow> <red>Needs both Steam Logistics and Pneumatic Logic research
    waila: "Pneumatic Line Valve | %state%"

  pneumatic_line_sensor:
    name: "Pneumatic Line Sensor"
    lore: |-
      <arrow> <white>Line → Logic bridge</white>: outputs steam when items pass or line state changes
      <arrow> Place in a production line; items pass through transparently
      <arrow> Modes: <white>Pulse</white> (on item pass) / <white>Jammed</white> / <white>Idle</white>
      <arrow> Mode and steam type adjustable in GUI; signal readable from any adjacent side
      <arrow> <red>Needs both Steam Logistics and Pneumatic Logic research
    waila: "Pneumatic Line Sensor | %mode% | %state%"

  pneumatic_distributor:
    name: "Pneumatic Distributor"
    lore: |-
      <arrow> Consumes pressurized steam to route items into the pneumatic network
      <arrow> Each face must connect directly to a <white>Pneumatic Input</white> or reach one through ducts
      <arrow> Supports 1�? output directions (N/S/E/W/Up/Down) �?toggle each in the GUI
      <arrow> Multiple enabled directions are served round-robin
      <arrow> <attr>Pressurized buffer:</attr> %pressurized-buffer%
      <arrow> <attr>Steam per item:</attr> %steam-per-item%
      <arrow> <attr>Max items per tick:</attr> %items-per-tick%
    waila: "Pneumatic Distributor | Pressurized %pressurized-bar% | %enabled-directions% direction(s) on | %state%"

  steam_precision_mill:
    name: "Steam Precision Mill"
    lore: |-
      <arrow> Feeds superheated steam into a high-speed milling head to cut alloy ingots into precision parts
      <arrow> Requires a Steam Heating Chamber to supply superheated steam
      <arrow> Multiblock: place 3 Pylon Steel Blocks horizontally below the machine
      <arrow> Typical outputs: precision gears, valves, heat sinks
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
    waila: "Steam Precision Mill | Superheated Steam %steam-bar% | %state%"

  precision_foundry:
    name: "Precision Foundry"
    lore: |-
      <arrow> Forms alloy ingots directly from metals, flux, and superheated steam
      <arrow> Skips the dust-to-smelting loop for high-throughput alloy lines
      <arrow> Pneumatic inputs feed the material buffer; pneumatic outputs extract finished ingots
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
    waila: "Precision Foundry | Superheated Steam %steam-bar% | %state%"

  precision_catalytic_reactor:
    name: "Precision Catalytic Reactor"
    lore: |-
      <arrow> Consumes catalyst cores to synthesize advanced materials
      <arrow> Creates new outputs such as palladium alloy and high polymer
      <arrow> Pneumatic inputs feed reactants; pneumatic outputs extract products
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
    waila: "Precision Catalytic Reactor | Superheated Steam %steam-bar% | %state%"

  heavy_impact_crusher:
    name: "Heavy Impact Crusher"
    lore: |-
      <arrow> A manganese steel crusher with milling blades as impact heads, built for hard blocks and ores
      <arrow> Complements the steam grinder: grinder makes fine dust, crusher delivers coarse output and ore doubling
      <arrow> Slot in a Pylon Compat module to also run grindstone recipes (slower and more steam-hungry to fit the heavy duty role)
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
    waila: "Heavy Impact Crusher | Superheated Steam %steam-bar% | %state%"

  hydraulic_forge:
    name: "Hydraulic Forge"
    lore: |-
      <arrow> A forged-plate platform driven by hydraulic pressure for precision forming
      <arrow> The core source for high-pressure pipes, flanges, pistons, seals, and forged plates
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
    waila: "Hydraulic Forge | Superheated Steam %steam-bar% | %state%"

  precision_crystallizer:
    name: "Precision Crystallizer"
    lore: |-
      <arrow> An invar-walled chamber that holds a perfectly stable temperature for hours of slow crystallization
      <arrow> Refines raw ores, dusts, and ore fragments into high-purity ingots and vanilla gems
      <arrow> Never duplicates material �?strict refinement ratios (4 dust �?1 ingot, 4 raw ore �?1 steel ingot)
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
    waila: "Precision Crystallizer | Superheated Steam %steam-bar% | %state%"

  precision_centrifuge:
    name: "Precision Centrifuge"
    lore: |-
      <arrow> A duralumin rotor on precision bearings spins fast enough to separate mixtures by density into weighted random outputs
      <arrow> Processes samples, scrap, and composite dusts: every cycle yields one randomly weighted product
      <arrow> The premium recovery route for analysis samples, machine scrap, and other "fuzzy" inputs
      <arrow> Multiblock: 2 Pylon steel support beams on each side + 2 at each corner above/below (8 total)
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
    waila: "Precision Centrifuge | Superheated Steam %steam-bar% | %state%"

  high_pressure_pipe:
    name: "High-Pressure Pipe"
    lore: <arrow> A manganese bronze forged pipe segment, wear- and pressure-resistant, the standard piece for hydraulic and high-pressure lines

  high_pressure_flange:
    name: "High-Pressure Flange"
    lore: |-
      <arrow> Forged from invar alloy for minimal thermal expansion
      <arrow> Holds its seal across a wide temperature range

  hydraulic_piston:
    name: "Hydraulic Piston"
    lore: |-
      <arrow> A wear-resistant manganese bronze reciprocating element
      <arrow> The core moving part of any hydraulic actuator

  hydraulic_seal:
    name: "Hydraulic Seal"
    lore: |-
      <arrow> Vulcanized rubber forged into a metal shell under pressure
      <arrow> Provides high-pressure sealing between piston and cylinder

  forged_plate:
    name: "Forged Plate"
    lore: |-
      <arrow> A high-density structural plate evened out under forging pressure
      <arrow> The load-bearing shell and chassis stock for heavy machinery

  machine_calibrator:
    name: "<gray>Precision Calibrator"
    lore: |-
      <arrow> Right-click a machine to open its upgrade slots

  upgrade_module_energy_save:
    name: "<aqua>Energy Save Module"
    lore: |-
      <arrow> Reduces steam consumption by 20%
      <arrow> Stacks up to 80% reduction

  upgrade_module_range:
    name: "<light_purple>Range Module"
    lore: |-
      <arrow> Turbine only: extends scan radius by 1 block per module
      <arrow> Lets the turbine reach more nearby machines

  upgrade_module_boost:
    name: "<gold>Boost Module"
    lore: |-
      <arrow> Turbine only: adds +1 boost tick per operation
      <arrow> Only 1 allowed per turbine (non-stackable)

  upgrade_module_pylon_compat:
    name: "<aqua>Pylon Compat Module"
    lore: |-
      <arrow> Unlocks Pylon recipes for this machine
      <arrow> Grinder: Grindstone recipes
      <arrow> Heavy Impact Crusher: Grindstone recipes (higher steam cost)
      <arrow> Steeping Vat: Crude Alloy Furnace recipes
      <arrow> Precision Foundry: Forming / Pipe Bending / Table Saw recipes
      <arrow> Catalytic Reactor: Kiln recipes (item output only)

  upgrade_module_auto_input:
    name: "<green>Auto-Input Module"
    lore: |-
      <arrow> Automatically pulls items from all adjacent containers
      <arrow> <red>Conflicts with Auto-Output Module �?cannot be installed together

  upgrade_module_auto_output:
    name: "<red>Auto-Output Module"
    lore: |-
      <arrow> Automatically pushes output items to all adjacent containers
      <arrow> <red>Conflicts with Auto-Input Module �?cannot be installed together

  upgrade_module_bulk:
    name: "<gold>Bulk Processing Module"
    lore: |-
      <arrow> Produces one extra output per recipe if ingredients are available
      <arrow> Each module adds one more extra output attempt

  # Precision mill products
  precision_gear:
    name: "Precision Gear"
    lore: |-
      <arrow> A low-thermal-expansion transmission gear milled from invar
      <arrow> Core drive component for mid-tier machines

  precision_screw:
    name: "Precision Screw"
    lore: |-
      <arrow> A high-accuracy threaded rod milled from invar
      <arrow> Used in precision positioning and feed mechanisms

  precision_valve:
    name: "Precision Valve"
    lore: |-
      <arrow> A wear-resistant control valve milled from tungsten
      <arrow> For precise regulation of high-pressure fluids

  wear_plate:
    name: "Wear Plate"
    lore: |-
      <arrow> A high-abrasion-resistant liner milled from manganese steel
      <arrow> Protects internal machine surfaces and friction faces

  heat_sink:
    name: "Heat Sink"
    lore: |-
      <arrow> A lightweight, high-efficiency thermal fin milled from duralumin
      <arrow> Used in thermal management modules for high-load machines

  milling_blade:
    name: "Milling Blade"
    lore: |-
      <arrow> A high-hardness cutter edge made from manganese steel
      <arrow> Core consumable for the mill; also a crafting material for mid-tier machines

  catalyst_core:
    name: "Catalyst Core"
    lore: |-
      <arrow> A rare catalytic core precision-milled from palladium
      <arrow> Used in advanced chemical reactions and precision synthesis

  precision_bearing:
    name: "Precision Bearing"
    lore: |-
      <arrow> A high-speed rotary load carrier milled from steel
      <arrow> Reduces internal friction and improves transmission efficiency

  palladium_alloy_ingot:
    name: "Palladium Alloy Ingot"
    lore: |-
      <arrow> Catalyst-stabilized palladium alloy with excellent thermal endurance
      <arrow> A late precision material for advanced steam automation

  high_polymer:
    name: "High Polymer"
    lore: |-
      <arrow> Dense polymer synthesized from fiber, vulcanized rubber, and a catalyst core
      <arrow> Useful for seals, insulation, and advanced reaction components

  sequenced_workpiece:
    name: "Sequenced Workpiece"
    lore: |-
      <arrow> A data-bearing intermediate item for multi-step production lines
      <arrow> Its durability bar shows the current sequence step
      <arrow> Pneumatic automation can route it between matching machines
    tooltip:
      header: "<gray>Steamwork sequenced workpiece"
      line: "<dark_gray>Process: <gold>%line%"
      step: "<dark_gray>Step: <aqua>%step% / %steps%"
    palladium_alloy:
      line_name: "Palladium Alloy"
      step_1:
        next: "<dark_gray>Next: <gray>Precision Foundry + Mineral Flux �?Rough Palladium Alloy Ingot"
      step_2:
        next: "<dark_gray>Next: <gray>Precision Mill �?Calibrated Palladium Alloy Blank"
      step_3:
        next: "<dark_gray>Next: <gray>Precision Foundry + Mineral Flux �?Palladium Alloy Ingot (final)"
    flight_core:
      line_name: "Steam Flight Core"
      step_1:
        next: "<dark_gray>Next: <gray>Precision Foundry + Mineral Flux + Heating Coil -> Rough Flight Core"
      step_2:
        next: "<dark_gray>Next: <gray>Precision Mill -> Calibrated Flight Core Blank"
      step_3:
        next: "<dark_gray>Next: <gray>Assembly Bench + Jet Nozzle + Precision Bearing -> Steam Flight Core (final)"

  palladium_workpiece_1:
    name: "<aqua>Activated Palladium Matrix"
  palladium_workpiece_2:
    name: "<gold>Rough Palladium Alloy Ingot"
  palladium_workpiece_3:
    name: "<yellow>Calibrated Palladium Alloy Blank"

  jet_nozzle:
    name: "Jet Nozzle"
    lore: |-
      <arrow> High-pressure tungsten-alloy jet nozzle; the thrust part for flight gear
      <arrow> Used to craft the Steam Flight Core and tungsten flight armor
  steam_flight_core:
    name: "<aqua>Steam Flight Core"
    lore: |-
      <arrow> A flight power core forged through four stages: catalysis, foundry, precision milling and assembly
      <arrow> The key part of the Tungsten Steam Chestplate, granting the full tungsten set jet flight
  flight_core_workpiece_1:
    name: "<aqua>Activated Flight Alloy Matrix"
  flight_core_workpiece_2:
    name: "<gold>Rough Flight Core"
  flight_core_workpiece_3:
    name: "<yellow>Calibrated Flight Core Blank"

  turbine_rotor:
    name: "Turbine Rotor"
    lore: |-
      <arrow> A high-speed rotor assembled from palladium alloy, precision bearings, wear plate and a high-pressure flange
      <arrow> The core moving part of the Precision Steam Turbine

  steam_distillation_tower:
    name: "Steam Distillation Tower"
    lore: |-
      <arrow> A modular tower that distills materials with superheated steam
      <arrow> Stack 1-4 sections + condenser cap; more sections unlock complex recipes
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Distillation Tower | %structure% | Steam %steam-bar% | %state%"

  distillation_tower_section:
    name: "Distillation Tower Section"
    lore: <arrow> A glass-and-invar tray that adds one stage to a distillation tower

  distillation_condenser:
    name: "Distillation Condenser"
    lore: <arrow> The copper cap that completes a distillation tower

  steam_vortex_tube:
    name: "Steam Vortex Tube"
    lore: |-
      <arrow> North face: superheated steam in; south face: pressurized steam out; east face: distilled water out
      <arrow> Each cycle consumes %input% superheated steam, yields %pressurized% pressurized + %water% distilled water
      <arrow> ~10% conversion loss; distilled water is used in downstream chemistry recipes
      <arrow> The only way to upgrade superheated steam to pressurized steam

  pneumatic_logic_gate:
    name: "Pneumatic Logic Gate"
    lore: |-
      <arrow> <white>Front = output</white>, <white>back + left + right = inputs</white>; steam ≥ threshold = HIGH
      <arrow> GUI to pick gate type (AND/OR/XOR/NOT); threshold adjustable (1–1000 mB)
      <arrow> When logic passes, steam moves into buffer and supplies downstream; chainable
    waila: "Pneumatic Logic Gate <dark_gray>|</dark_gray> %mode% <dark_gray>|</dark_gray> Filter %kind% <dark_gray>|</dark_gray> %state%"

  pneumatic_differential_gate:
    name: "Pneumatic Differential Gate"
    lore: |-
      <arrow> <white>Front = output</white>, <white>back = source A</white>, <white>right = reference B</white>
      <arrow> Passes steam when A − B ≥ threshold; prevents backfeed
      <arrow> All three steam tiers independent; threshold adjustable in GUI
    waila: "Pneumatic Differential Gate <dark_gray>|</dark_gray> Threshold %threshold% <dark_gray>|</dark_gray> Filter %kind% <dark_gray>|</dark_gray> %state%"

  pneumatic_pulser:
    name: "Pneumatic Pulser"
    lore: |-
      <arrow> <white>Back = charging input</white>, <white>front = pulse output</white>
      <arrow> Releases pulse when charge reaches threshold; amount adjustable in GUI
      <arrow> Repeater on top shows charge progress
    waila: "Pneumatic Pulser <dark_gray>|</dark_gray> Charge %charge%% <dark_gray>|</dark_gray> Filter %kind% <dark_gray>|</dark_gray> %state%"

  pneumatic_latch:
    name: "Pneumatic Latch"
    lore: |-
      <arrow> <white>Front = output</white>, <white>back = supply</white>, <white>left = SET</white>, <white>right = RESET</white>
      <arrow> SET has steam → latched (supply flows); RESET has steam → unlatched
      <arrow> Retains last state when idle; RESET takes priority
    waila: "Pneumatic Latch <dark_gray>|</dark_gray> Filter %kind% <dark_gray>|</dark_gray> %state%"

  steam_oscillator:
    name: "Steam Oscillator"
    lore: |-
      <arrow> Draws steam from the input face and charges; bursts to the output face for <white>%ticks% ticks</white> once full
      <arrow> After the burst ends or pressure drops below the lower threshold, charging resumes
      <arrow> Higher supply rate = higher pulse frequency; no steam = stopped
      <arrow> Connect output face to a steam machine or logic gate to drive timed automation
      <arrow> <attr>Upper threshold:</attr> %threshold% <attr>Burst duration:</attr> %ticks% ticks
    waila: "Steam Oscillator | %fluid% %pressure-bar% | %state%"

  pneumatic_gate_valve:
    name: "Pneumatic Gate Valve"
    lore: |-
      <arrow> Place inline in a <white>pneumatic duct</white> chain; faces align with the duct direction
      <arrow> <white>Normally open</white> — items pass freely; closes immediately when powered by redstone
      <arrow> While closed the duct network treats it as disconnected; items do not pile up at the valve
      <arrow> Pair with a pressure transducer or logic gate for steam-gated item flow
    waila: "Pneumatic Gate Valve | %state%"

  steam_pressure_transducer:
    name: "Steam Pressure Transducer"
    lore: |-
      <arrow> Place against any steam machine; select the <white>read face</white> and steam tier in the GUI
      <arrow> Maps the adjacent machine's steam fill ratio to a <white>0–15 analog redstone signal</white>
      <arrow> Place a <white>comparator</white> against the transducer to read the signal directly
      <arrow> The only true analog redstone output in the steam system
    waila: "Steam Pressure Transducer | %fluid% %pressure-bar% | Redstone %level%"

  steam_difference_engine:
    name: "Steam Difference Engine"
    lore: |-
      <arrow> A tribute to Babbage's Difference Engine: a programmable <white>up to order-%order%</white> difference register
      <arrow> Each work stroke consumes <white>%steam%</white> steam, cascading the differences to emit the next term
      <arrow> Order 1 = linear ramp, 2 = parabola, 3 = cubic; all registers wrap modularly, so the sequence loops
      <arrow> Pick one output: <white>0–15 analog redstone</white> / <white>steam pulse amount</white> / <white>frequency-divided pulses</white>
      <arrow> Ramp production cadence up or down, shape nonlinear steam waveforms, or act as a clock divider
    waila: "Steam Difference Engine | %mode% | Value %value% | %state%"

  pneumatic_pressure_module:
    name: "Pneumatic Pressure Module"
    lore: |-
      <arrow> Slots inline in a <white>pneumatic duct</white> chain, inspired by PneumaticCraft tube modules
      <arrow> Pick one of three modes in the GUI: <white>Flow Meter</white> / <white>Throttle</white> / <white>Overflow Alarm</white>
      <arrow> Flow Meter: measures item throughput → <white>0–15 analog redstone</white> (comparator on its side)
      <arrow> Throttle: caps items passing per window; disconnects the network when exceeded
      <arrow> Overflow Alarm: emits a redstone alert when transfers are rejected by a full downstream
    waila: "Pneumatic Pressure Module | %mode% | %detail%"

  # Distillation byproducts and intermediates
  refined_resin:
    name: "Refined Resin"
    lore: |-
      <arrow> Resin distilled clean of impurities for high-grade rubberwork
      <arrow> Used in advanced seals and elastic components

  plant_essence:
    name: "Plant Essence"
    lore: |-
      <arrow> A concentrated organic extract pulled from plant matter
      <arrow> Used in biology research and chemical preparations

  distilled_water_vial:
    name: "Distilled Water Vial"
    lore: |-
      <arrow> A glass vial of pure distilled water
      <arrow> Empty into a fluid input slot for chemistry recipes

  mineral_leachate_vial:
    name: "Mineral Leachate Vial"
    lore: <arrow> Bottled mineral leachate, ready for further processing

  waste_acid_vial:
    name: "Waste Acid Vial"
    lore: |-
      <arrow> Spent acid byproduct from mineral distillation
      <arrow> Neutralize with mineral flux in the distillation tower to recover mineral leachate vials

  mineral_concentrate:
    name: "Mineral Concentrate"
    lore: |-
      <arrow> Dense mineral cake distilled from flux and leachate
      <arrow> A precursor for high-purity metallurgy

  fiber_residue:
    name: "Fiber Residue"
    lore: |-
      <arrow> Solid pulp left over from steam-distilling plant fiber
      <arrow> Re-distill in the tower to break down into bone meal and mineral flux

  # Research samples
  mineral_analysis_sample:
    name: "Mineral Analysis Sample"
    lore: |-
      <arrow> A prepared mineral specimen for the steam science interface
      <arrow> Yields <green>5</green> material discipline research points
      <arrow> Yields <green>2</green> global research points

  organic_analysis_sample:
    name: "Organic Analysis Sample"
    lore: |-
      <arrow> A bottled organic specimen for the steam science interface
      <arrow> Yields <green>5</green> biology discipline research points
      <arrow> Yields <green>2</green> global research points

  metallurgical_analysis_sample:
    name: "Metallurgical Analysis Sample"
    lore: |-
      <arrow> A high-temperature alloy specimen for the steam science interface
      <arrow> Yields <green>7</green> precision discipline research points
      <arrow> Yields <green>2</green> global research points

  fluid_analysis_sample:
    name: "Fluid Analysis Sample"
    lore: |-
      <arrow> A sealed fluid specimen for the steam science interface
      <arrow> Yields <green>6</green> chemistry discipline research points
      <arrow> Yields <green>2</green> global research points

  refined_mineral_sample:
    name: "Refined Mineral Sample"
    lore: |-
      <arrow> Four mineral samples compressed in a steam press
      <arrow> Yields <green>25</green> material discipline points (~5× base efficiency)
      <arrow> Yields <green>6</green> global research points
      <arrow> <attr>~2× steam efficiency compared to basic samples</attr>

  concentrated_organic_sample:
    name: "Concentrated Organic Sample"
    lore: |-
      <arrow> Four organic samples compressed in a steam press
      <arrow> Yields <green>25</green> biology discipline points (~5× base efficiency)
      <arrow> Yields <green>6</green> global research points
      <arrow> <attr>~2× steam efficiency compared to basic samples</attr>

  refined_metallurgical_sample:
    name: "Refined Metallurgical Sample"
    lore: |-
      <arrow> Four metallurgical samples refined in a steam press
      <arrow> Yields <green>35</green> precision discipline points (~5× base efficiency)
      <arrow> Yields <green>8</green> global research points
      <arrow> <attr>~2× steam efficiency compared to basic samples</attr>

  purified_fluid_sample:
    name: "Purified Fluid Sample"
    lore: |-
      <arrow> Four fluid samples purified and compressed in a steam press
      <arrow> Yields <green>30</green> chemistry discipline points (~5× base efficiency)
      <arrow> Yields <green>7</green> global research points
      <arrow> <attr>~2× steam efficiency compared to basic samples</attr>

  analysis_residue:
    name: "Analysis Residue"
    lore: <arrow> Spent material left over after a research analysis cycle

