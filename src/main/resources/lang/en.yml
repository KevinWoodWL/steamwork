addon: "蒸汽工坊"

item:
  zinc_ingot:
    name: "Zinc Ingot"
    lore: <arrow> A silvery-grey base metal used to make brass alloys

  brass_ingot:
    name: "Brass Ingot"
    lore: <arrow> A sturdy copper-zinc alloy for pressure fittings and steam machinery

  nichrome_dust:
    name: "Nichrome Dust"
    lore: |-
      <arrow> A heat-resistant alloy powder mixed in the steam pressurized furnace
      <arrow> Smelt it into nichrome ingots

  nichrome_ingot:
    name: "Nichrome Ingot"
    lore: |-
      <arrow> A high-resistance, heat-resistant alloy for coils and high-temperature machinery
      <arrow> Smelted from nichrome dust

  rubber_gasket:
    name: "Rubber Gasket"
    lore: <arrow> Seals pipe joints against leaking steam

  pressure_gauge:
    name: "Pressure Gauge"
    lore: <arrow> A compact dial for reading boiler pressure

  zinc_concentrate:
    name: "Zinc Concentrate"
    lore: |-
      <arrow> Zinc-rich mineral concentrate washed from amethyst materials
      <arrow> Smelt it into zinc ingots

  plant_fiber:
    name: "Plant Fiber"
    lore: |-
      <arrow> Heat-softened fiber drawn out in a steam steeping vat
      <arrow> Useful as cordage and coil winding

  steam_pulp:
    name: "Steam Pulp"
    lore: |-
      <arrow> Plant slurry prepared with hot water and steam
      <arrow> Press it into paper

  raw_resin:
    name: "Raw Resin"
    lore: |-
      <arrow> Sticky resin steamed out of roots, wood, or elastic materials
      <arrow> Sterilize and cure it into rubber

  vulcanized_rubber:
    name: "Vulcanized Rubber"
    lore: |-
      <arrow> Heat-stable rubber cured in a steam sterilizer
      <arrow> Used for steam seals

  sterile_biomass:
    name: "Sterile Biomass"
    lore: |-
      <arrow> Stable substrate from steam-treated rotten or fungal matter
      <arrow> Reserved for future farming, fermentation, or chemical processes

  silica_grit:
    name: "Silica Grit"
    lore: |-
      <arrow> High-purity fine grit separated in a washing trough
      <arrow> Useful for insulation, glasswork, and fluxes

  mineral_flux:
    name: "Mineral Flux"
    lore: |-
      <arrow> A smelting additive blended from grit, clay, and bone meal
      <arrow> Reserved for high-temperature alloys and furnace materials

  treated_wood:
    name: "Treated Wood"
    lore: |-
      <arrow> Wood stabilized by steam steeping
      <arrow> Good for early machine frames and insulated housings

  fiberboard:
    name: "Fiberboard"
    lore: |-
      <arrow> Pressed from pulp, plant fiber, and resin
      <arrow> Useful as lightweight structure and heat lining

  rubberized_fabric:
    name: "Rubberized Fabric"
    lore: |-
      <arrow> Flexible fiber treated with steam and resin
      <arrow> Useful for seals, hoses, and protective layers

  sterile_culture:
    name: "Sterile Culture"
    lore: |-
      <arrow> A stable culture medium from processed sterile biomass
      <arrow> Reserved for fermentation, medicine, or biological processing

  machine_scrap:
    name: "Machine Scrap"
    lore: |-
      <arrow> Worn-off metal shavings and broken parts from steam machines
      <arrow> Has a small chance to drop above the machine on each recipe completion
      <arrow> Sources: Steam Sterilizer, Steeping Vat, Washing Trough, Steam Press, Steam Grinder
      <arrow> Feed back into the Steam Grinder to recover iron ingots

  heat_treated_metal:
    name: "Heat-Treated Metal"
    lore: |-
      <arrow> Dense metal plate stress-equalized under high-temperature steam
      <arrow> Used in steam machinery components requiring high structural strength

  brass_gear:
    name: "Brass Gear"
    lore: <arrow> A precision mechanical transmission component

  heating_coil:
    name: "Heating Coil"
    lore: <arrow> A heat-resistant coil made from nichrome alloy

  # Brass machine components
  brass_distillation_tube:
    name: "Brass Distillation Tube"
    lore: <arrow> Corrosion-resistant tube bent from brass and tin sheets, for steam distillation

  brass_filter:
    name: "Brass Filter"
    lore: <arrow> Brass and tin sheet mesh for filtration in steeping processes

  brass_sieve:
    name: "Brass Sieve"
    lore: <arrow> Porous brass and tin structure for particle classification in washing troughs

  brass_flow_valve:
    name: "Brass Flow Valve"
    lore: <arrow> Brass and redstone-controlled water flow valve for precise regulation

  brass_fan_blade:
    name: "Brass Fan Blade"
    lore: <arrow> High-efficiency brass and tin air flow propulsion blade

  brass_valve_core:
    name: "Brass Valve Core"
    lore: <arrow> High-strength valve core made from zinc and brass alloy

  brass_seal_ring:
    name: "Brass Seal Ring"
    lore: <arrow> High-pressure seal ring made from brass and tin sheets

  # Pressurized alloys
  invar_dust:
    name: "Invar Dust"
    lore: |-
      <arrow> A precision alloy powder compacted in the Steam Pressurized Furnace
      <arrow> Smelt it into an invar ingot

  invar_ingot:
    name: "Invar Ingot"
    lore: |-
      <arrow> An iron-nickel alloy with near-zero thermal expansion
      <arrow> Smelted from invar dust

  duralumin_dust:
    name: "Duralumin Dust"
    lore: |-
      <arrow> A lightweight alloy powder mixed under steam pressure
      <arrow> Smelt it into a duralumin ingot

  duralumin_ingot:
    name: "Duralumin Ingot"
    lore: |-
      <arrow> A high-strength lightweight alloy of copper and amethyst
      <arrow> Smelted from duralumin dust

  tungsten_dust:
    name: "Tungsten Dust"
    lore: |-
      <arrow> A heat-resistant metal powder compacted by high-pressure steam
      <arrow> Smelt it into a tungsten ingot

  tungsten_ingot:
    name: "Tungsten Ingot"
    lore: |-
      <arrow> An extremely heat-resistant rare metal
      <arrow> Smelted from tungsten dust

  manganese_steel_dust:
    name: "Manganese Steel Dust"
    lore: |-
      <arrow> Alloy steel powder with manganese additives pressed into the mix
      <arrow> Smelt it into a manganese steel ingot

  manganese_steel_ingot:
    name: "Manganese Steel Ingot"
    lore: |-
      <arrow> A highly wear-resistant alloy steel
      <arrow> Smelted from manganese steel dust

  manganese_bronze_dust:
    name: "Manganese Bronze Dust"
    lore: |-
      <arrow> A bearing bronze powder compacted for transmission parts
      <arrow> Smelt it into a manganese bronze ingot

  manganese_bronze_ingot:
    name: "Manganese Bronze Ingot"
    lore: |-
      <arrow> A manganese-and-iron reinforced bronze, ideal for bearings
      <arrow> Smelted from manganese bronze dust

  # Alloy blocks
  invar_block:
    name: "Invar Block"
    lore: <arrow> A dense block of pressed invar ingots
  duralumin_block:
    name: "Duralumin Block"
    lore: <arrow> A lightweight block of pressed duralumin ingots
  tungsten_block:
    name: "Tungsten Block"
    lore: <arrow> A heavy block of pressed tungsten ingots
  manganese_steel_block:
    name: "Manganese Steel Block"
    lore: <arrow> A high-strength block of pressed manganese steel ingots
  manganese_bronze_block:
    name: "Manganese Bronze Block"
    lore: <arrow> A wear-resistant block of pressed manganese bronze ingots

  # Machine components
  steam_motor:
    name: "Steam Motor"
    lore: <arrow> The core power unit for driving steam machinery
    tooltip: "<gray>Assembles from Pylon and Steamwork mid-tier components"

  # Steam weapons
  steam_sword:
    name: "Steam Sword"
    lore: |-
      <arrow> A steam-powered blade, far deadlier than ordinary iron
      <arrow> <attr>Steam capacity:</attr> <aqua>%capacity%</aqua>

  # Steam tools
  steam_pickaxe:
    name: "Steam Pickaxe"
    lore: |-
      <arrow> A steam-driven rotary impact pick for fast mining
      <arrow> <attr>Steam capacity:</attr> <aqua>%capacity%</aqua>

  steam_axe:
    name: "Steam Axe"
    lore: |-
      <arrow> An internal-combustion lumber axe
      <arrow> <attr>Steam capacity:</attr> <aqua>%capacity%</aqua>

  steam_shovel:
    name: "Steam Shovel"
    lore: |-
      <arrow> A vibrating steam-powered digging shovel
      <arrow> <attr>Steam capacity:</attr> <aqua>%capacity%</aqua>

  steam_hoe:
    name: "Steam Hoe"
    lore: |-
      <arrow> A steam-driven farming implement
      <arrow> <attr>Steam capacity:</attr> <aqua>%capacity%</aqua>

  # Steam armor
  steam_helmet:
    name: "Steam Helmet"
    lore: |-
      <arrow> A protective helmet with a miniature boiler
      <arrow> <attr>Steam capacity:</attr> <aqua>%capacity%</aqua>

  steam_chestplate:
    name: "Steam Chestplate"
    lore: |-
      <arrow> Heavy steam chestplate forged from brass and iron
      <arrow> <attr>Steam capacity:</attr> <aqua>%capacity%</aqua>

  steam_leggings:
    name: "Steam Leggings"
    lore: |-
      <arrow> Reinforced leggings lined with steam pipes
      <arrow> <attr>Steam capacity:</attr> <aqua>%capacity%</aqua>

  steam_boots:
    name: "Steam Boots"
    lore: |-
      <arrow> Heavy boots with steam-damped shock absorbers
      <arrow> <attr>Steam capacity:</attr> <aqua>%capacity%</aqua>

  # Portable steam energy
  steam_canister_brass:
    name: "Brass Steam Canister"
    lore: |-
      <arrow> Entry-tier portable steam storage
      <arrow> <attr>Capacity:</attr> <aqua>%capacity%</aqua>

  steam_canister_invar:
    name: "Invar Steam Canister"
    lore: |-
      <arrow> Mid-tier portable steam storage with reinforced invar casing
      <arrow> <attr>Capacity:</attr> <aqua>%capacity%</aqua>

  steam_canister_tungsten:
    name: "Tungsten Steam Canister"
    lore: |-
      <arrow> Top-tier portable steam storage, rated for superheated steam
      <arrow> <attr>Capacity:</attr> <aqua>%capacity%</aqua>

  # Block items
  bronze_boiler:
    name: "Bronze Boiler"
    lore: |-
      <arrow> An entry multiblock boiler reinforced with Pylon bronze
      <arrow> Structure: Pylon bronze blocks on both sides, bronze grating on top, heat below
      <arrow> <attr>Water buffer:</attr> %water-buffer%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Water usage:</attr> %water-per-second%
      <arrow> <attr>Steam output:</attr> %steam-per-second%
    waila: "Bronze Boiler | %structure% | Water %water-bar% | Steam %steam-bar% | %pressure%"

  invar_boiler:
    name: "Invar Boiler"
    lore: |-
      <arrow> A high-efficiency boiler made from low-expansion alloy, using less water
      <arrow> Structure: invar blocks on both sides, Pylon iron support beam on top, heat below
      <arrow> <attr>Water buffer:</attr> %water-buffer%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Water usage:</attr> %water-per-second%
      <arrow> <attr>Steam output:</attr> %steam-per-second%
    waila: "Invar Boiler | %structure% | Water %water-bar% | Steam %steam-bar% | %pressure%"

  manganese_steel_boiler:
    name: "Manganese Steel Boiler"
    lore: |-
      <arrow> A heavy industrial boiler built from wear-resistant steel for fast steam output
      <arrow> Structure: manganese steel blocks on both sides, Pylon steel support beam on top, heat below
      <arrow> <attr>Water buffer:</attr> %water-buffer%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Water usage:</attr> %water-per-second%
      <arrow> <attr>Steam output:</attr> %steam-per-second%
    waila: "Manganese Steel Boiler | %structure% | Water %water-bar% | Steam %steam-bar% | %pressure%"

  tungsten_boiler:
    name: "Tungsten Boiler"
    lore: |-
      <arrow> A top-end high-temperature boiler for extreme steam throughput
      <arrow> Structure: tungsten blocks on both sides, Pylon refractory bricks on top, heat below
      <arrow> <attr>Water buffer:</attr> %water-buffer%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Water usage:</attr> %water-per-second%
      <arrow> <attr>Steam output:</attr> %steam-per-second%
    waila: "Tungsten Boiler | %structure% | Water %water-bar% | Steam %steam-bar% | %pressure%"

  steam_arm:
    name: "Steam Arm"
    lore: |-
      <arrow> Moves items between inventories in a short range
      <arrow> <attr>Range:</attr> %range%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Steam per transfer:</attr> %steam-per-transfer%
    waila: "Steam Arm | %steam-bar% | %state%"

  simple_steam_turbine:
    name: "Simple Steam Turbine"
    lore: |-
      <arrow> Scans nearby furnaces for steam boosting (Basic version)
      <arrow> Supports: Furnaces, Blast Furnaces, Smokers
      <arrow> <attr>Scan radius:</attr> %scan-radius%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Steam per boost:</attr> %steam-per-operation%
    waila: "Simple Steam Turbine | Steam %steam-bar% | Targets %targets%/%boosted% | %state%"

  advanced_steam_turbine:
    name: "Advanced Steam Turbine"
    lore: |-
      <arrow> Scans nearby furnaces and Pylon heat sources for steam boosting (Premium version)
      <arrow> Supports: Furnaces, Blast Furnaces, Smokers, Refinery, Heat Line
      <arrow> <attr>Scan radius:</attr> %scan-radius%
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Steam per boost:</attr> %steam-per-operation%
    waila: "Advanced Steam Turbine | Steam %steam-bar% | Targets %targets%/%boosted% | %state%"

  steam_sterilizer:
    name: "Steam Sterilizer"
    lore: |-
      <arrow> Cleans rotten materials, fungi, and resin with hot pressurized steam
      <arrow> Produces sterile biomass and vulcanized rubber
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Sterilizer | Steam %steam-bar%"

  steam_steeping_vat:
    name: "Steam Steeping Vat"
    lore: |-
      <arrow> Steeps plants, roots, and sticky materials with hot water and steam
      <arrow> Produces plant fiber, steam pulp, and raw resin
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Steeping Vat | Steam %steam-bar%"

  steam_washing_trough:
    name: "Steam Washing Trough"
    lore: |-
      <arrow> Washes minerals and sediments with hot water and steam
      <arrow> Produces zinc concentrate, clay, and small mineral byproducts
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Washing Trough | Steam %steam-bar%"

  steam_press:
    name: "Steam Press"
    lore: |-
      <arrow> A high-pressure steam piston that presses materials into sheets and boards
      <arrow> Multi-block: place machine, leave one air gap below, then place an Iron Block
      <arrow> Right-click the Iron Block to insert items; output drops at the Iron Block
      <arrow> Shift+Right-click to deposit the entire main-hand stack at once
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Press | Steam %steam-bar% | %state%"

  steam_grinder:
    name: "Steam Grinder"
    lore: |-
      <arrow> A steam-driven grinding wheel that dry-mills stones and metal ingots into dust
      <arrow> Produces quartz and Pylon metal dusts
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Grinder | Steam %steam-bar%"

  steam_pressurized_furnace:
    name: "Steam Pressurized Furnace"
    lore: |-
      <arrow> Compacts materials into advanced alloy dusts using high-pressure steam
      <arrow> Makes invar, duralumin, tungsten, manganese steel, and manganese bronze dusts
      <arrow> Drop items on top, right-click or wait for auto-processing
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Pressurized Furnace | Steam %steam-bar% | %state%"

  steam_assembly_bench:
    name: "Steam Assembly Bench"
    lore: |-
      <arrow> Assembles bases + brass parts + alloy components into steam equipment
      <arrow> Requires a 3×1×3 structure: main block + 4 bronze blocks at the corners
      <arrow> All steam tools, armor, and canisters are built here
    waila: "Steam Assembly Bench | %structure%"

  steam_science_interface:
    name: "Steam Science Interface"
    lore: |-
      <arrow> Burns regular steam to analyze samples into research points
      <arrow> Right-click to claim accumulated points
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Stored points cap:</attr> %max-points%
    waila: "Steam Science Interface | Steam %steam-bar% | Stored %points% | %state%"

  steam_heating_chamber:
    name: "Steam Heating Chamber"
    lore: |-
      <arrow> Re-heats regular steam into superheated steam at a 3:1 ratio
      <arrow> A bridge between basic boilers and advanced steam machinery
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Superheated buffer:</attr> %superheated-buffer%
    waila: "Steam Heating Chamber | %state%"

  steam_compressor:
    name: "Steam Compressor"
    lore: |-
      <arrow> Compresses regular steam into pressurized steam at a 2:1 ratio
      <arrow> Required to power the pneumatic cargo system
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
      <arrow> <attr>Pressurized buffer:</attr> %pressurized-buffer%
      <arrow> <attr>Input per cycle:</attr> %input%
      <arrow> <attr>Output per cycle:</attr> %output%
    waila: "Steam Compressor | Steam %steam-bar% | Pressurized %pressurized-bar% | %state%"

  steam_precision_mill:
    name: "Steam Precision Mill"
    lore: |-
      <arrow> Feeds superheated steam into a high-speed milling head to cut alloy ingots into precision parts
      <arrow> Requires a Steam Heating Chamber to supply superheated steam
      <arrow> Typical outputs: precision gears, valves, heat sinks
      <arrow> <attr>Superheated steam buffer:</attr> %steam-buffer%
    waila: "Steam Precision Mill | Superheated Steam %steam-bar% | %state%"

  # Precision mill products
  precision_gear:
    name: "Precision Gear"
    lore: |-
      <arrow> A low-thermal-expansion transmission gear milled from invar
      <arrow> Core drive component for mid-tier machines

  precision_screw:
    name: "Precision Screw"
    lore: |-
      <arrow> A high-accuracy threaded rod milled from invar
      <arrow> Used in precision positioning and feed mechanisms

  precision_valve:
    name: "Precision Valve"
    lore: |-
      <arrow> A wear-resistant control valve milled from tungsten
      <arrow> For precise regulation of high-pressure fluids

  wear_plate:
    name: "Wear Plate"
    lore: |-
      <arrow> A high-abrasion-resistant liner milled from manganese steel
      <arrow> Protects internal machine surfaces and friction faces

  heat_sink:
    name: "Heat Sink"
    lore: |-
      <arrow> A lightweight, high-efficiency thermal fin milled from duralumin
      <arrow> Used in thermal management modules for high-load machines

  milling_blade:
    name: "Milling Blade"
    lore: |-
      <arrow> A high-hardness cutter edge made from manganese steel
      <arrow> Core consumable for the mill; also a crafting material for mid-tier machines

  catalyst_core:
    name: "Catalyst Core"
    lore: |-
      <arrow> A rare catalytic core precision-milled from palladium
      <arrow> Used in advanced chemical reactions and precision synthesis

  precision_bearing:
    name: "Precision Bearing"
    lore: |-
      <arrow> A high-speed rotary load carrier milled from steel
      <arrow> Reduces internal friction and improves transmission efficiency

  steam_distillation_tower:
    lore: |-
      <arrow> A modular tower that distills materials with superheated steam
      <arrow> Stack 1-4 sections + condenser cap; more sections unlock complex recipes
      <arrow> <attr>Steam buffer:</attr> %steam-buffer%
    waila: "Steam Distillation Tower | %structure% | Steam %steam-bar% | %state%"

  distillation_tower_section:
    name: "Distillation Tower Section"
    lore: <arrow> A glass-and-invar tray that adds one stage to a distillation tower

  distillation_condenser:
    name: "Distillation Condenser"
    lore: <arrow> The copper cap that completes a distillation tower

  # Distillation byproducts and intermediates
  refined_resin:
    name: "Refined Resin"
    lore: |-
      <arrow> Resin distilled clean of impurities for high-grade rubberwork
      <arrow> Used in advanced seals and elastic components

  plant_essence:
    name: "Plant Essence"
    lore: |-
      <arrow> A concentrated organic extract pulled from plant matter
      <arrow> Used in biology research and chemical preparations

  distilled_water_vial:
    name: "Distilled Water Vial"
    lore: |-
      <arrow> A glass vial of pure distilled water
      <arrow> Empty into a fluid input slot for chemistry recipes

  mineral_leachate_vial:
    name: "Mineral Leachate Vial"
    lore: <arrow> Bottled mineral leachate, ready for further processing

  waste_acid_vial:
    name: "Waste Acid Vial"
    lore: |-
      <arrow> Spent acid byproduct from mineral distillation
      <arrow> Neutralize with mineral flux in the distillation tower to recover mineral leachate vials

  mineral_concentrate:
    name: "Mineral Concentrate"
    lore: |-
      <arrow> Dense mineral cake distilled from flux and leachate
      <arrow> A precursor for high-purity metallurgy

  fiber_residue:
    name: "Fiber Residue"
    lore: |-
      <arrow> Solid pulp left over from steam-distilling plant fiber
      <arrow> Re-distill in the tower to break down into bone meal and mineral flux

  # Research samples
  mineral_analysis_sample:
    name: "Mineral Analysis Sample"
    lore: |-
      <arrow> A prepared mineral specimen for the steam science interface
      <arrow> Yields material discipline research points

  organic_analysis_sample:
    name: "Organic Analysis Sample"
    lore: |-
      <arrow> A bottled organic specimen for the steam science interface
      <arrow> Yields biology discipline research points

  metallurgical_analysis_sample:
    name: "Metallurgical Analysis Sample"
    lore: |-
      <arrow> A high-temperature alloy specimen for the steam science interface
      <arrow> Yields precision discipline research points

  fluid_analysis_sample:
    name: "Fluid Analysis Sample"
    lore: |-
      <arrow> A sealed fluid specimen for the steam science interface
      <arrow> Yields chemistry discipline research points

  analysis_residue:
    name: "Analysis Residue"
    lore: <arrow> Spent material left over after a research analysis cycle

gui:
  steam_arm:
    title: "<dark_gray>Steam Arm"
    steam_gauge: "<aqua>Steam Storage"
    steam: "<gray>Steam: <reset><aqua>%steam% <gray>/ <aqua>%capacity%"
    progress_bar: "<reset>%bar% <gray>%percent%"
    items_per_transfer: "<gray>Items per transfer"
    steam_per_transfer: "<gray>Steam for this transfer: <reset><aqua>%steam%"
    steam_per_item: "<gray>Steam per item: <reset><aqua>%steam%"
    steam_per_operation: "<gray>Steam for this transfer: <reset><aqua>%steam%"
    items_setting: "<yellow>Transfer Amount"
    items_hint: "<gray>LMB +1 | RMB -1"
    items_hint_shift: "<gray>Shift+LMB +10 | Shift+RMB -10"
    current_amount: "<aqua>Current: %amount%"
    input_target:
      name: "<yellow>Input Target"
      title: "<gray>Input Target Settings"
      count: "<gray>Configured: <reset>%count% <gray>/ %max%"
      hint: "<gray>LMB to enter selection mode"
      hint_select: "<gray>LMB to add/remove container | RMB to keep selection"
      list_hint: "<gray>RMB to view configured blocks"
    output_target:
      name: "<yellow>Output Target"
      title: "<gray>Output Target Settings"
      count: "<gray>Configured: <reset>%count% <gray>/ %max%"
      hint: "<gray>LMB to enter selection mode"
      hint_select: "<gray>LMB to add/remove container | RMB to keep selection"
      list_hint: "<gray>RMB to view configured blocks"
    target_list:
      input_title: "<dark_gray>Input Target List"
      output_title: "<dark_gray>Output Target List"
      entry: "<yellow>Target #%index%"
      coordinates: "<gray>Coordinates: <white>%x%, %y%, %z%"
      coordinates_large: "<gray>Coordinates: <white>%x%, %y%, %z% <gray>~ <white>%px%, %py%, %pz%"
      remove_hint: "<red>LMB to remove this target"
      back: "<yellow>Back"
      back_hint: "<gray>Return to the Steam Arm menu"
    distribution:
      name: "<yellow>Distribution Method"
      current: "<gray>Current: <reset>%mode%"
      hint: "<gray>LMB next | RMB previous"
      mode:
        round_robin: "<aqua>Round Robin"
        strict_round_robin: "<gold>Forced Round Robin"
        first_priority: "<green>First Target Priority"
      desc:
