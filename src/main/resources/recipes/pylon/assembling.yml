steamwork:steam_motor:
  inputs:
    - steamwork:brass_gear: 2
    - steamwork:heating_coil: 2
    - steamwork:pressure_gauge: 1
    - pylon:bronze_ingot: 2
    - pylon:steel_sheet: 2
    - pylon:backflow_valve: 1
  results:
    - steamwork:steam_motor
  steps:
    - tool: "hammer"
      icon: pylon:stone_hammer
      clicks: 4
      add-displays:
        - name: "base"
          item: minecraft:terracotta
          position: [0.5, 0.5]
          scale: [0.7, 0.03, 0.85]
    - tool: "hammer"
      icon: pylon:stone_hammer
      clicks: 3
      add-displays:
        - name: "gear1"
          item: minecraft:copper_block
          position: [0.3, 0.5]
          scale: [0.15, 0.15, 0.15]
        - name: "gear2"
          item: minecraft:copper_block
          position: [0.7, 0.5]
          scale: [0.15, 0.15, 0.15]
    - tool: "screwdriver"
      icon: pylon:copper_screwdriver
      clicks: 6
      add-displays:
        - name: "coil"
          item: minecraft:gold_ingot
          position: [0.5, 0.5]
          scale: [0.2, 0.2, 0.2]
    - tool: "screwdriver"
      icon: pylon:copper_screwdriver
      clicks: 4
      add-displays:
        - name: "valve1"
          item: minecraft:light_gray_terracotta
          position: [0.3, 0.3]
          scale: [0.1, 0.1, 0.1]
        - name: "valve2"
          item: minecraft:light_gray_terracotta
          position: [0.7, 0.3]
          scale: [0.1, 0.1, 0.1]
    - tool: "hammer"
      icon: pylon:stone_hammer
      clicks: 3
